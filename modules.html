<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Модули</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/modules.css" />
</head>
<body>
  <div class="page page-my-agent">
    <section class="card-section">
      <div class="card-section-header">
        <h2 class="card-section-title">Модули сервиса</h2>
        <p class="card-section-subtitle">
          Выберите инструмент для работы, обучения, контента и роста команды
        </p>
      </div>

      <div class="card-section-body modules-summary-body">
        <div class="profile-row">
          <span class="profile-label">Доступ</span>
          <span class="profile-value" id="subscriptionStatusLabel">Проверка доступа...</span>
        </div>
        <div class="profile-row">
          <span class="profile-label">Открытие модулей</span>
          <span class="profile-value">
            Базовые модули открываются сразу. Платные модули требуют активного доступа и при его отсутствии переводят пользователя на страницу оплаты.
          </span>
        </div>
      </div>
    </section>

    <div id="modulesList"></div>
  </div>

  <script>
    function getTenantModules() {
      try {
        const shellModules =
          window.parent?.AICAppShell?.getTenantModules?.() || [];

        return shellModules
          .filter((module) => module.enabled)
          .map((module) => ({
            id: module.id,
            title: module.title,
            titleRu: module.titleRu || module.title,
            shortDescription:
              module.shortDescription ||
              "Описание модуля будет заполнено в tenant-конфиге.",
            fullDescription:
              module.fullDescription && module.fullDescription.length
                ? module.fullDescription
                : ["Описание модуля будет добавлено позже."],
            page: module.page,
            requiresPayment: !!module.requiresPayment,
            category: module.category || "core"
          }));
      } catch (error) {
        console.error("[AI CENTER][Modules] tenant modules read failed", error);
        return [];
      }
    }

    const MODULES = getTenantModules();

    const USER_ACCESS = {
      subscriptionActive: true
    };

    function openModule(module) {
      const needsPayment = !!module.requiresPayment;
      const hasAccess = !needsPayment || USER_ACCESS.subscriptionActive;

      if (hasAccess) {
        window.parent?.postMessage?.(
          {
            type: "navigate",
            page: module.page,
            tab: "modules"
          },
          "*"
        );
      } else {
        window.parent?.postMessage?.(
          {
            type: "navigate",
            page: "payments.html",
            tab: "payments"
          },
          "*"
        );
      }
    }

    function closeAllModuleCards() {
      document.querySelectorAll(".module-card-expanded.open").forEach((el) => {
        el.classList.remove("open");
      });

      document.querySelectorAll(".module-accordion-card.open").forEach((el) => {
        el.classList.remove("open");
      });

      document.querySelectorAll(".module-card-toggle").forEach((btn) => {
        btn.setAttribute("aria-expanded", "false");
      });

      document.querySelectorAll(".module-card-chevron").forEach((icon) => {
        icon.textContent = "▾";
      });
    }

    function createModuleCard(module) {
      const section = document.createElement("section");
      section.className = "card-section module-accordion-card";
      section.innerHTML = `
        <div class="card-section-header module-card-header">
          <button class="module-card-toggle" type="button" aria-expanded="false">
            <div class="module-card-header-text">
              <h2 class="card-section-title module-card-title">
                ${module.title}
                <span class="module-card-title-ru">/ ${module.titleRu}</span>
              </h2>
            </div>
            <span class="accordion-icon module-card-chevron">▾</span>
          </button>
        </div>

        <div class="card-section-body module-card-main">
          <p class="module-card-short-description">${module.shortDescription}</p>
          <button
            class="btn btn-block"
            type="button"
            data-module-id="${module.id}"
            data-module-page="${module.page}"
          >
            Открыть модуль
          </button>
        </div>

        <div class="card-section-body accordion-body module-card-expanded">
          <div class="module-card-expanded-title">Подробнее о модуле</div>
          <ul class="module-card-description-list">
            ${module.fullDescription.map((item) => `<li>${item}</li>`).join("")}
          </ul>
        </div>
      `;

      const toggleBtn = section.querySelector(".module-card-toggle");
      const expandedBody = section.querySelector(".module-card-expanded");
      const chevron = section.querySelector(".module-card-chevron");
      const openBtn = section.querySelector(".btn");

      toggleBtn.addEventListener("click", () => {
        const isOpen = expandedBody.classList.contains("open");
        closeAllModuleCards();

        if (!isOpen) {
          expandedBody.classList.add("open");
          section.classList.add("open");
          toggleBtn.setAttribute("aria-expanded", "true");
          chevron.textContent = "▴";
        }
      });

      openBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        openModule(module);
      });

      return section;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const modulesList = document.getElementById("modulesList");
      const subscriptionStatusLabel = document.getElementById("subscriptionStatusLabel");

      if (subscriptionStatusLabel) {
        subscriptionStatusLabel.textContent = USER_ACCESS.subscriptionActive
          ? "Платные модули доступны"
          : "Доступ только к базовым модулям";
      }

      if (modulesList) {
        if (!MODULES.length) {
          modulesList.innerHTML = `
            <section class="card-section">
              <div class="card-section-body modules-empty-state">
                <p class="module-card-short-description">
                  Для этого tenant пока не настроен список модулей.
                </p>
              </div>
            </section>
          `;
        } else {
          MODULES.forEach((module) => {
            modulesList.appendChild(createModuleCard(module));
          });
        }
      }
    });
  </script>
</body>
</html>
