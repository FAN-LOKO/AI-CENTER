<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Модули</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/modules.css" />
</head>
<body>
  <div class="page page-my-agent">
    <section class="card-section">
      <div class="card-section-header">
        <h2 class="card-section-title">Модули сервиса</h2>
        <p class="card-section-subtitle">
          Выберите инструмент для работы, обучения, контента и роста команды
        </p>
      </div>

      <div class="card-section-body modules-summary-body">
        <div class="profile-row">
          <span class="profile-label">Каталог</span>
          <span class="profile-value" id="subscriptionStatusLabel">Загрузка модулей...</span>
        </div>
        <div class="profile-row">
          <span class="profile-label">Статус модулей</span>
          <span class="profile-value">
            Сейчас доступны 3 модуля: базовый модуль Агента и 2 бесплатных модуля. Остальные модули показаны как витрина и отмечены статусом «В разработке».
          </span>
        </div>
      </div>
    </section>

    <div id="modulesList"></div>
  </div>

  <script>
    /* =========================================================
     * PAGE STATE
     * Что здесь:
     * - tenant config страницы
     * - feature flags
     * - fallback route для модулей без страницы
     * - tenant catalog модулей
     * - user access map по модулям
     * - флаг готовности страницы
     * - список реально доступных модулей
     * ========================================================= */

    let TENANTCONFIG = null;
    let APPFEATURES = {
      home: true,
      myAgent: true,
      modules: true,
      sharedChat: true,
      affiliate: true,
      payments: true,
      settings: true
    };

    const MODULE_FALLBACK_PAGE = 'module-coming-soon.html';

    let TENANTMODULES = [];
    let USERMODULEACCESS = {};
    let _modulesReady = false;

    const AVAILABLE_MODULE_IDS = ['ai-agent', 'knowledge-hub', 'support-desk'];
    const BASE_MODULE_IDS = ['ai-agent'];
    const FREE_MODULE_IDS = ['knowledge-hub', 'support-desk'];

    /* =========================================================
     * SHELL HELPERS
     * Что здесь:
     * - чтение tenant config из shell
     * - чтение текстов из tenant config
     * - чтение tenant modules из shell
     * ========================================================= */

    function getTenantConfig() {
      try {
        return window.parent?.AICAppShell?.getTenantConfig?.() || null;
      } catch (error) {
        console.error('[AI CENTER][Modules] tenant config read failed', error);
        return null;
      }
    }

    function getText(key, fallback = '') {
      return TENANTCONFIG?.texts?.[key] ?? fallback;
    }

    function getTenantModulesRaw() {
      const fallbackModules = [
        {
          id: 'ai-agent',
          title: 'Agent Connection',
          titleRu: 'Подключение Агента',
          shortDescription: 'Подключение и управление ИИ-агентом для диалогов и первичной квалификации.',
          fullDescription: [
            'Подключение соцсетей и каналов общения, включая Telegram и другие площадки.',
            'Готовый ИИ-агент на платформенной модели без настройки API со стороны пользователя.',
            'Обработка входящих сообщений, первичный рекрутинг и квалификация обращений.',
            'История диалогов и возможность ручного вмешательства в общение.',
            'Базовая статистика по диалогам, обращениям и лидам.'
          ],
          page: 'modules-agent/profile.html',
          enabled: true,
          category: 'base',
          requiresPayment: false
        },
        {
          id: 'knowledge-hub',
          title: 'Knowledge Hub',
          titleRu: 'База знаний',
          shortDescription: 'Материалы, обучение и AI-поиск по знаниям компании, продукта и процессов.',
          fullDescription: [
            'Материалы по продукту, бизнес-модели, скриптам, возражениям, презентациям и эфирам.',
            'Обучающие дорожки для разных ролей: новичок, партнёр, лидер.',
            'AI-поиск по базе знаний и быстрый доступ к нужным материалам.',
            'Привязка материалов к другим модулям платформы.'
          ],
          page: 'modules-knowledge-hub.html',
          enabled: true,
          category: 'free',
          requiresPayment: false
        },
        {
          id: 'support-desk',
          title: 'Support Desk',
          titleRu: 'Центр поддержки',
          shortDescription: 'Поддержка, обращения, сервисные вопросы и сопровождение пользователей.',
          fullDescription: [
            'Единая точка входа для сервисных запросов.',
            'Помощь по onboarding, оплатам и доступам.',
            'Передача обращений в поддержку и контроль статуса.',
            'База быстрых ответов по типовым вопросам.'
          ],
          page: 'modules-support-desk.html',
          enabled: true,
          category: 'free',
          requiresPayment: false
        },
        {
          id: 'media-lab',
          title: 'Media Lab',
          titleRu: 'Медиа Лаб',
          shortDescription: 'Инструменты для создания контента, упаковки офферов и материалов для продвижения.',
          fullDescription: [
            'Генерация и упаковка контента для соцсетей и рассылок.',
            'Шаблоны офферов, прогревов, постов и сторис.',
            'Подготовка материалов для личного бренда и командного маркетинга.',
            'Модуль планируется к запуску в следующих релизах.'
          ],
          page: MODULE_FALLBACK_PAGE,
          enabled: true,
          category: 'optional',
          requiresPayment: true
        },
        {
          id: 'team-space',
          title: 'Team Space',
          titleRu: 'Командный центр',
          shortDescription: 'Пространство для совместной работы команды, управления задачами и внутренней координации.',
          fullDescription: [
            'Общий центр командных задач и ролей.',
            'Внутренние заметки, распределение процессов и чек-листов.',
            'Быстрый обзор активности команды и внутренних действий.',
            'Модуль планируется к запуску в следующих релизах.'
          ],
          page: MODULE_FALLBACK_PAGE,
          enabled: true,
          category: 'optional',
          requiresPayment: true
        },
        {
          id: 'academy',
          title: 'Academy',
          titleRu: 'Академия',
          shortDescription: 'Система обучения, треков развития и маршрутов роста для новичков и лидеров.',
          fullDescription: [
            'Пошаговые программы обучения для разных ролей.',
            'Маршруты адаптации новичков и роста партнёров.',
            'Материалы, задания и контроль прохождения.',
            'Модуль планируется к запуску в следующих релизах.'
          ],
          page: MODULE_FALLBACK_PAGE,
          enabled: true,
          category: 'optional',
          requiresPayment: true
        },
        {
          id: 'analytics',
          title: 'Analytics',
          titleRu: 'Аналитика',
          shortDescription: 'Сводки, отчёты и ключевые показатели по активности, заявкам, лидам и оплатам.',
          fullDescription: [
            'Единая витрина метрик по обращениям, диалогам и действиям.',
            'Сводка ключевых показателей по команде и воронке.',
            'Панели для анализа роста и эффективности.',
            'Модуль планируется к запуску в следующих релизах.'
          ],
          page: MODULE_FALLBACK_PAGE,
          enabled: true,
          category: 'optional',
          requiresPayment: true
        }
      ];

      try {
        const raw = window.parent?.AICAppShell?.getTenantModules?.();

        if (Array.isArray(raw) && raw.length) {
          const merged = [...raw];

          fallbackModules.forEach(fallbackModule => {
            const exists = merged.some(module => module && module.id === fallbackModule.id);
            if (!exists) {
              merged.push(fallbackModule);
            }
          });

          return merged;
        }

        return fallbackModules;
      } catch (error) {
        console.error('[AI CENTER][Modules] tenant modules read failed', error);
        return fallbackModules;
      }
    }

    /* =========================================================
     * MODULE CATALOG HELPERS
     * Что здесь:
     * - определение route модуля
     * - нормализация user access map
     * - получение полного каталога модулей tenant
     * - ожидание загрузки tenant modules из shell
     * - сортировка модулей по приоритету
     * ========================================================= */

    function getModuleRoute(module) {
      if (!module) return MODULE_FALLBACK_PAGE;
      return module.page || MODULE_FALLBACK_PAGE;
    }

    function normalizeAccessMap(raw) {
      if (!raw || typeof raw !== 'object') return {};
      return raw;
    }

    function getModuleSortWeight(moduleId) {
      const order = [
        'ai-agent',
        'knowledge-hub',
        'support-desk',
        'media-lab',
        'team-space',
        'academy',
        'analytics'
      ];

      const index = order.indexOf(moduleId);
      return index === -1 ? 999 : index;
    }

    function getTenantModules() {
      try {
        const shellModules = getTenantModulesRaw();

        return shellModules
          .filter(module => module && module.enabled !== false)
          .map(module => ({
            id: module.id,
            title: module.title || module.titleRu || module.id,
            titleRu: module.titleRu || module.title || module.id,
            shortDescription:
              module.shortDescription ||
              getText('modulesDefaultShortDescription', 'Описание модуля будет заполнено в tenant-конфиге.'),
            fullDescription:
              Array.isArray(module.fullDescription) && module.fullDescription.length
                ? module.fullDescription
                : [getText('modulesDefaultFullDescription', 'Описание модуля будет добавлено позже.')],
            page: getModuleRoute(module),
            requiresPayment: !!module.requiresPayment,
            category: module.category || 'optional'
          }))
          .sort((a, b) => getModuleSortWeight(a.id) - getModuleSortWeight(b.id));
      } catch (error) {
        console.error('[AI CENTER][Modules] tenant modules normalize failed', error);
        return [];
      }
    }

    function waitForTenantModules(attempt = 0) {
      const modules = getTenantModules();

      if (modules.length || attempt >= 20) {
        return Promise.resolve(modules);
      }

      return new Promise(resolve => {
        setTimeout(() => {
          resolve(waitForTenantModules(attempt + 1));
        }, 150);
      });
    }

    /* =========================================================
     * USER ACCESS HELPERS
     * Что здесь:
     * - получение access state по модулю
     * - проверка, доступен ли модуль прямо сейчас
     * - проверка, находится ли модуль в активной поставке
     * - вычисление текста общей сводки страницы
     * - вычисление текста кнопки карточки
     * ========================================================= */

    function getModuleAccess(moduleId) {
      const accessMap = normalizeAccessMap(USERMODULEACCESS);
      return accessMap[moduleId] || null;
    }

    function isAvailableModule(module) {
      return !!module && AVAILABLE_MODULE_IDS.includes(module.id);
    }

    function isModuleAccessible(module) {
      if (!module) return false;
      if (!isAvailableModule(module)) return false;
      if (!module.requiresPayment) return true;

      const access = getModuleAccess(module.id);
      return !!access?.paid && !access?.frozen;
    }

    function getCatalogStatusText() {
      if (!TENANTMODULES.length) {
        return getText('modulesEmptyText', 'Для этого tenant пока не настроен список модулей.');
      }

      return `Всего модулей в каталоге: ${TENANTMODULES.length}`;
    }

    function getModuleOpenButtonText(module) {
      if (!module) return getText('modulesActionOpen', 'Открыть модуль');

      if (!isAvailableModule(module)) {
        return getText('modulesActionSoon', 'В разработке');
      }

      return getText('modulesActionOpen', 'Открыть модуль');
    }

    function isModuleButtonDisabled(module) {
      return !isAvailableModule(module);
    }

    /* =========================================================
     * MODULE NAVIGATION
     * Что здесь:
     * - переход только в реально доступные модули
     * - защита от нажатия на модули в разработке
     * ========================================================= */

    function openModule(module) {
      if (!module) return;
      if (APPFEATURES.modules === false) return;
      if (!isAvailableModule(module)) return;

      const moduleRoute = getModuleRoute(module);

      window.parent?.postMessage?.(
        {
          type: 'navigate',
          page: moduleRoute,
          tab: 'modules'
        },
        '*'
      );
    }

    /* =========================================================
     * ACCORDION HELPERS
     * Что здесь:
     * - закрытие всех раскрытых карточек
     * ========================================================= */

    function closeAllModuleCards() {
      document.querySelectorAll('.module-card-expanded.open').forEach(el => {
        el.classList.remove('open');
      });

      document.querySelectorAll('.module-accordion-card.open').forEach(el => {
        el.classList.remove('open');
      });

      document.querySelectorAll('.module-card-toggle').forEach(btn => {
        btn.setAttribute('aria-expanded', 'false');
      });
    }

    /* =========================================================
     * CARD BADGE HELPERS
     * Что здесь:
     * - определение badge как на home
     * - базовый / бесплатный / опциональный
     * ========================================================= */

    function getModuleTypeBadge(module) {
      if (!module) {
        return {
          text: 'Опциональный',
          cls: 'is-optional'
        };
      }

      if (BASE_MODULE_IDS.includes(module.id)) {
        return {
          text: 'Базовый модуль',
          cls: 'is-base'
        };
      }

      if (FREE_MODULE_IDS.includes(module.id)) {
        return {
          text: 'Бесплатный',
          cls: 'is-free'
        };
      }

      return {
        text: 'Опциональный',
        cls: 'is-optional'
      };
    }

    /* =========================================================
     * CARD RENDERING
     * Что здесь:
     * - создание одной карточки модуля
     * - badge типа модуля
     * - кнопка открытия / заглушка в разработке
     * - контент раскрывающейся части карточки
     * ========================================================= */

    function createModuleCard(module) {
      const section = document.createElement('section');
      section.className = 'card-section accordion-card module-accordion-card';

      const badge = getModuleTypeBadge(module);
      const isDisabledButton = isModuleButtonDisabled(module);
      const buttonDisabledAttr = isDisabledButton ? 'disabled aria-disabled="true"' : '';
      const buttonExtraClass = isDisabledButton ? ' btn-disabled' : '';

      section.innerHTML = `
  <button class="card-section-header accordion-header module-card-toggle" type="button" aria-expanded="false">
    <span class="module-card-header-text">
      <span class="module-card-title">
        ${module.title}
        <span class="module-card-title-ru">/ ${module.titleRu}</span>
      </span>
    </span>
    <span class="accordion-header-icon" aria-hidden="true"></span>
  </button>

  <div class="card-section-body module-card-main">
    <span class="module-card-badge ${badge.cls}">${badge.text}</span>
    <p class="module-card-short-description">${module.shortDescription}</p>
    <button
      class="btn btn-block${buttonExtraClass}"
      type="button"
      data-module-id="${module.id}"
      data-module-page="${module.page}"
      ${buttonDisabledAttr}
    >
      ${getModuleOpenButtonText(module)}
    </button>
  </div>

  <div class="card-section-body accordion-body module-card-expanded">
    <div class="module-card-expanded-title">
      ${getText('modulesDetailsTitle', 'Подробнее о модуле')}
    </div>
    <ul class="module-card-description-list">
      ${module.fullDescription.map(item => `<li>${item}</li>`).join('')}
    </ul>
  </div>
`;

      const toggleBtn = section.querySelector('.module-card-toggle');
      const expandedBody = section.querySelector('.module-card-expanded');
      const openBtn = section.querySelector('.btn');

      toggleBtn.addEventListener('click', () => {
        const isOpen = section.classList.contains('open');
        closeAllModuleCards();

        if (!isOpen) {
          section.classList.add('open');
          expandedBody.classList.add('open');
          toggleBtn.setAttribute('aria-expanded', 'true');
        }
      });

      if (!isDisabledButton) {
        openBtn.addEventListener('click', e => {
          e.stopPropagation();
          openModule(module);
        });
      } else {
        openBtn.addEventListener('click', e => {
          e.preventDefault();
          e.stopPropagation();
        });
      }

      return section;
    }

    /* =========================================================
     * PAGE RENDERING
     * Что здесь:
     * - отрисовка общей витрины модулей
     * - empty/disabled state
     * - обновление summary строки
     * ========================================================= */

    function renderModulesList() {
      const modulesList = document.getElementById('modulesList');
      const subscriptionStatusLabel = document.getElementById('subscriptionStatusLabel');

      if (subscriptionStatusLabel) {
        subscriptionStatusLabel.textContent = getCatalogStatusText();
      }

      if (!modulesList) return;

      modulesList.innerHTML = '';

      if (APPFEATURES.modules === false) {
        modulesList.innerHTML = `
          <section class="card-section">
            <div class="card-section-body modules-empty-state">
              <p class="module-card-short-description">
                ${getText('modulesDisabledText', 'Раздел модулей сейчас недоступен.')}
              </p>
            </div>
          </section>
        `;
        return;
      }

      if (!TENANTMODULES.length) {
        modulesList.innerHTML = `
          <section class="card-section">
            <div class="card-section-body modules-empty-state">
              <p class="module-card-short-description">
                ${getText('modulesEmptyText', 'Для этого tenant пока не настроен список модулей.')}
              </p>
            </div>
          </section>
        `;
        return;
      }

      TENANTMODULES.forEach(module => {
        modulesList.appendChild(createModuleCard(module));
      });
    }

    /* =========================================================
     * FEATURE FLAGS
     * Что здесь:
     * - применение feature flags со стороны shell
     * - повторный рендер страницы после обновления
     * ========================================================= */

    function applyAppFeatures(features) {
      APPFEATURES = { ...APPFEATURES, ...(features || {}) };

      if (_modulesReady) {
        renderModulesList();
      }
    }

    /* =========================================================
     * MESSAGE BUS
     * Что здесь:
     * - получение app features от shell
     * - получение user modules от shell
     * - обновление user access map без изменения каталога
     * ========================================================= */

    window.addEventListener('message', event => {
      const data = event.data;
      if (!data || typeof data !== 'object') return;

      if (data.type === 'app-features') {
        applyAppFeatures(data.features || {});
      } else if (data.type === 'user-modules' && Array.isArray(data.modules)) {
        const accessMap = {};

        data.modules.forEach(module => {
          if (!module || !module.id) return;
          accessMap[module.id] = {
            paid: !!module.paid,
            frozen: !!module.frozen,
            daysLeft: typeof module.daysLeft === 'number' ? module.daysLeft : null
          };
        });

        USERMODULEACCESS = accessMap;

        if (_modulesReady) {
          renderModulesList();
        }
      }
    });

    /* =========================================================
     * BOOTSTRAP
     * Что здесь:
     * - получение tenant config
     * - получение каталога модулей
     * - первый рендер страницы
     * - запрос feature flags и user modules из shell
     * ========================================================= */

    document.addEventListener('DOMContentLoaded', async () => {
      TENANTCONFIG = getTenantConfig();
      TENANTMODULES = await waitForTenantModules();
      _modulesReady = true;

      renderModulesList();

      window.parent?.postMessage?.({ type: 'request-app-features' }, '*');
      window.parent?.postMessage?.({ type: 'request-user-modules' }, '*');
    });
  </script>
</body>
</html>
