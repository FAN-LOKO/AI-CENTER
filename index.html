<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>AI FIT CENTER — Старт</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="screen">
      <div class="page">
        <!-- Стартовая карточка авторизации -->
        <section class="card-section">
          <div class="card-section-header" style="text-align:center;">
  <h1
    class="card-section-title"
    style="
      font-size: 60px;
      font-weight: 800;
      line-height: 1.05;
      text-transform: uppercase;
      margin: 0 0 8px;
    "
  >
    <!-- AI -->
    <span
      style="
        display:block;
        color:#f9fafb;
        text-shadow:
          0 3px 0 rgba(15,23,42,0.9),
          0 8px 18px rgba(15,23,42,0.7);
      "
    >
      AI
    </span>

    <!-- FIT (алый) -->
    <span
      style="
        display:block;
        color:#ef4444; /* приятный алый */
        text-shadow:
          0 3px 0 rgba(15,23,42,0.9),
          0 8px 18px rgba(15,23,42,0.7);
      "
    >
      FIT
    </span>

    <!-- CENTER -->
    <span
      style="
        display:block;
        color:#f9fafb;
        text-shadow:
          0 3px 0 rgba(15,23,42,0.9),
          0 8px 18px rgba(15,23,42,0.7);
      "
    >
      CENTER
    </span>
  </h1>

  <p
    class="card-section-subtitle"
    style="
      margin: 0;
      font-size: 15px;
      opacity: 0.95;
    "
  >
    Добро пожаловать!
  </p>
</div>


          <div class="card-section-body">
            <div
              style="
                font-size: 13px;
                color: #6b7280;
                margin-bottom: 14px;
              "
            >
              Перед началом работы подтвердите согласие с политикой
              конфиденциальности и обработкой персональных данных.
            </div>

            <!-- Чекбоксы согласий -->
            <label
              style="
                display: flex;
                align-items: flex-start;
                gap: 10px;
                padding: 10px 12px;
                border-radius: 10px;
                background: rgba(255, 255, 255, 0.9);
                box-shadow: 0 2px 10px rgba(15, 23, 42, 0.12);
                margin-bottom: 10px;
                cursor: pointer;
                font-size: 13px;
                color: #374151;
              "
            >
              <input
                id="privacyCheckbox"
                type="checkbox"
                style="
                  margin-top: 2px;
                  width: 18px;
                  height: 18px;
                  cursor: pointer;
                "
              />
              <span>
                Согласен с
                <a
                  href="#"
                  style="color:#3b82f6; text-decoration: underline;"
                  target="_blank"
                >
                  политикой конфиденциальности
                </a>
              </span>
            </label>

            <label
              style="
                display: flex;
                align-items: flex-start;
                gap: 10px;
                padding: 10px 12px;
                border-radius: 10px;
                background: rgba(255, 255, 255, 0.9);
                box-shadow: 0 2px 10px rgba(15, 23, 42, 0.12);
                margin-bottom: 16px;
                cursor: pointer;
                font-size: 13px;
                color: #374151;
              "
            >
              <input
                id="dataCheckbox"
                type="checkbox"
                style="
                  margin-top: 2px;
                  width: 18px;
                  height: 18px;
                  cursor: pointer;
                "
              />
              <span>
                Согласен с обработкой персональных данных
              </span>
            </label>

            <!-- Кнопка авторизации -->
            <button
              id="startButton"
              class="btn btn-primary btn-block"
              disabled
              style="opacity: 0.5; cursor: not-allowed;"
            >
              Авторизоваться
            </button>

            <div
              style="
                margin-top: 10px;
                font-size: 11px;
                color: #9ca3af;
              "
            >
              Нажимая «Авторизоваться», вы разрешаете приложению использовать
              данные вашего Telegram‑профиля для авторизации.
            </div>
          </div>
        </section>
      </div>
    </div>

    <script>
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg && tg.ready) {
        tg.ready();
        tg.expand();
      }

      const privacyCheckbox = document.getElementById("privacyCheckbox");
      const dataCheckbox = document.getElementById("dataCheckbox");
      const startButton = document.getElementById("startButton");

      function updateButtonState() {
        const enabled =
          privacyCheckbox.checked && dataCheckbox.checked;

        startButton.disabled = !enabled;
        if (enabled) {
          startButton.style.opacity = "1";
          startButton.style.cursor = "pointer";
        } else {
          startButton.style.opacity = "0.5";
          startButton.style.cursor = "not-allowed";
        }
      }

      privacyCheckbox.addEventListener("change", updateButtonState);
      dataCheckbox.addEventListener("change", updateButtonState);

      startButton.addEventListener("click", function () {
        if (startButton.disabled) return;

        if (tg && tg.HapticFeedback && tg.HapticFeedback.impactOccurred) {
          tg.HapticFeedback.impactOccurred("medium");
        }

        // Переход в основную оболочку miniapp
        window.location.href = "app.html";
      });
    </script>
  </body>
</html>
