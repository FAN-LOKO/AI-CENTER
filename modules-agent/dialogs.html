<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Диалоги агента</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/modules.css" />
</head>
<body class="module-body">
  <div class="page page-my-agent">
    <div class="module-tabs agent-tabs">
      <button class="module-tab module-tab--third" type="button" onclick="navigateAgent('modules-agent/profile.html')">Профиль</button>
      <button class="module-tab module-tab--third" type="button" onclick="navigateAgent('modules-agent/connect.html')">Подключение</button>
      <button class="module-tab module-tab--third" type="button" onclick="navigateAgent('modules-agent/links.html')">Ссылки</button>
      <button class="module-tab module-tab--half" type="button" onclick="navigateAgent('modules-agent/stats.html')">Статистика</button>
      <button class="module-tab module-tab--half module-tab--active" type="button">Диалоги</button>
    </div>

    <div class="module-page-content module-dialogs-page">
      <section class="card-section">
        <div class="card-section-header">
          <h2 class="card-section-title" id="dialogTitle">Диалог с клиентом</h2>
          <p class="card-section-subtitle" id="dialogSubtitle">Клиент: @username • Канал: Telegram</p>
        </div>
        <div class="card-section-body">
          <div class="profile-row">
            <span class="profile-label">ID диалога</span>
            <span class="profile-value" id="dialogIdLabel">—</span>
          </div>
          <div class="profile-row">
            <span class="profile-label">Статус</span>
            <span class="profile-value" id="dialogStatusLabel">Активен</span>
          </div>
          <div class="profile-row">
            <span class="profile-label">Последнее сообщение</span>
            <span class="profile-value" id="dialogLastClientTimeLabel">—</span>
          </div>
        </div>
      </section>

      <section class="card-section module-workspace-card">
        <div class="card-section-header">
          <h2 class="card-section-title">История сообщений</h2>
          <p class="card-section-subtitle">Здесь отображается переписка агента и клиента</p>
        </div>

        <div class="card-section-body">
          <div id="messagesContainer" class="chat-messages">
            <div class="module-notice">История сообщений пока пуста.</div>
          </div>

          <textarea
            id="clientMessageInput"
            class="chat-input"
            rows="2"
            placeholder="Напишите сообщение клиенту..."
          ></textarea>

          <div class="chat-input-actions-row">
            <button class="btn btn-send" type="button" id="clientSendMessageButton">
              Отправить
            </button>

            <button
              id="clientVoiceButton"
              class="btn btn-icon"
              type="button"
              aria-label="Записать голосовое сообщение"
            >
              <svg class="icon-mic" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a1 1 0 1 1 2 0 7 7 0 0 1-6 6.92V21h2a1 1 0 1 1 0 2H9a1 1 0 1 1 0-2h2v-3.08A7 7 0 0 1 5 11a1 1 0 1 1 2 0 5 5 0 0 0 10 0z" />
              </svg>
            </button>
          </div>

          <p id="clientSendMessageStatus" class="connect-status-msg"></p>
        </div>
      </section>
    </div>
  </div>

  <script>
  (function () {
    let TENANTCONFIG = null;
    let APPFEATURES = {
      home: true,
      modules: true,
      sharedChat: true,
      affiliate: true,
      payments: true,
      settings: true,
      stats: true,
      dialogs: true,
      agentDialogs: true
    };

    function getShell() {
      try {
        return window.parent?.AICAppShell || null;
      } catch (error) {
        console.error('[AI CENTER][Dialogs] shell access failed', error);
        return null;
      }
    }

    function getTenantConfig() {
      try {
        return getShell()?.getTenantConfig?.() || null;
      } catch (error) {
        console.error('[AI CENTER][Dialogs] tenant config read failed', error);
        return null;
      }
    }

    function getAppFeatures() {
      try {
        return getShell()?.getAppFeatures?.() || {};
      } catch (error) {
        console.error('[AI CENTER][Dialogs] app features read failed', error);
        return {};
      }
    }

    function getText(key, fallback = '') {
      return TENANTCONFIG?.texts?.[key] ?? fallback;
    }

    function isDialogsAvailable() {
      if (APPFEATURES.modules === false) return false;
      if (APPFEATURES.dialogs === false) return false;
      if (APPFEATURES.agentDialogs === false) return false;
      return true;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatSequenceNumber(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n <= 0) {
        return getText('dialogsSequenceFallback', '000');
      }
      return String(n).padStart(3, '0');
    }

    function setTextContent(id, value, fallback = '') {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = value ?? fallback;
    }

    function applyTenantTexts() {
      setTextContent(
        'dialogsPageTitle',
        getText('dialogsPageTitle', 'Диалоги')
      );

      setTextContent(
        'dialogsPageSubtitle',
        getText('dialogsPageSubtitle', 'Список клиентских диалогов и быстрый переход в переписку.')
      );

      setTextContent(
        'dialogsCounterLabel',
        getText('dialogsCounterLabel', 'Всего диалогов')
      );

      setTextContent(
        'dialogsTodayCounterLabel',
        getText('dialogsTodayCounterLabel', 'Диалогов сегодня')
      );

      document.title =
        getText('dialogsBrowserTitle', '') ||
        getText('dialogsPageTitle', '') ||
        'Диалоги';
    }

    function getDialogsPayload() {
      try {
        const shell = getShell();

        const payload =
          shell?.getAgentModuleStats?.() ||
          shell?.getAgentStats?.() ||
          shell?.getDialogsData?.();

        if (payload && typeof payload === 'object') return payload;
      } catch (error) {
        console.error('[AI CENTER][Dialogs] dialogs payload read failed', error);
      }

      return {
        dialogs: [],
        stats: {}
      };
    }

    function getDialogsList() {
      const payload = getDialogsPayload();
      return Array.isArray(payload?.dialogs) ? payload.dialogs : [];
    }

    function renderDialogsCounters(dialogs, payload) {
      const total = Array.isArray(dialogs) ? dialogs.length : 0;
      const todayCount = Number(
        payload?.stats?.dialogsToday ??
        payload?.dialogsToday ??
        0
      );

      const totalEl = document.getElementById('dialogsCounter');
      const todayEl = document.getElementById('dialogsTodayCounter');

      if (totalEl) totalEl.textContent = String(total);
      if (todayEl) todayEl.textContent = String(todayCount);
    }

    function openDialog(dialog) {
      if (!isDialogsAvailable()) {
        console.warn('[AI CENTER][Dialogs] dialogs module is disabled');
        return;
      }

      const username =
        dialog?.username ||
        dialog?.clientName ||
        getText('dialogsUsernameFallback', '@username');

      const channel =
        dialog?.channel ||
        getText('dialogsChannelFallback', 'Telegram');

      const timeLabel = dialog?.timeLabel || dialog?.time || '';
      const lastMessage =
        dialog?.lastMessage ||
        dialog?.message ||
        getText('dialogsMessageFallback', 'Сообщений пока нет');

      try {
        window.parent?.postMessage?.(
          {
            type: 'agent-open-dialog',
            dialogId: dialog?.id || dialog?.dialogId || '',
            username,
            channel,
            timeLabel,
            lastMessage,
            source: 'dialogs'
          },
          '*'
        );
      } catch (error) {
        console.error('[AI CENTER][Dialogs] open dialog failed', error);
      }
    }

    function renderDialogsList(dialogs) {
      const container = document.getElementById('dialogsList');
      if (!container) return;

      if (!isDialogsAvailable()) {
        container.innerHTML = `<div class="module-notice">${escapeHtml(
          getText('dialogsDisabledText', 'Модуль диалогов сейчас недоступен.')
        )}</div>`;
        return;
      }

      if (!Array.isArray(dialogs) || dialogs.length === 0) {
        container.innerHTML = `<div class="module-notice">${escapeHtml(
          getText('dialogsEmptyText', 'Диалогов пока нет.')
        )}</div>`;
        return;
      }

      container.innerHTML = '';

      dialogs.forEach((dialog, index) => {
        const item = document.createElement('div');
        item.className = 'dialog-item';

        const username =
          dialog?.username ||
          dialog?.clientName ||
          getText('dialogsUsernameFallback', '@username');

        const timeLabel = dialog?.timeLabel || dialog?.time || '';
        const lastMessage =
          dialog?.lastMessage ||
          dialog?.message ||
          getText('dialogsMessageFallback', 'Сообщений пока нет');

        const displayNumber = formatSequenceNumber(index + 1);

        item.innerHTML = `
          <div class="dialog-item-row">
            <span class="dialog-user">${displayNumber} • ${escapeHtml(username)}</span>
            <span class="dialog-time">${escapeHtml(timeLabel)}</span>
          </div>
          <div class="dialog-last-msg">${escapeHtml(lastMessage)}</div>
        `;

        item.addEventListener('click', () => openDialog(dialog));
        container.appendChild(item);
      });
    }

    function renderDialogsPage() {
      const payload = getDialogsPayload();
      const dialogs = Array.isArray(payload?.dialogs) ? payload.dialogs : [];

      renderDialogsCounters(dialogs, payload);
      renderDialogsList(dialogs);
    }

    function applyAppFeatures(features) {
      APPFEATURES = { ...APPFEATURES, ...(features || {}) };
      renderDialogsPage();
    }

    window.addEventListener('message', (event) => {
      try {
        const data = event?.data;
        if (!data || typeof data !== 'object') return;

        if (data.type === 'app-features') {
          applyAppFeatures(data.features || {});
        }

        if (
          data.type === 'agent-dialog-update' ||
          data.type === 'agent-stats-update' ||
          data.type === 'agent-module-stats-update' ||
          data.type === 'agent-dialogs-update'
        ) {
          renderDialogsPage();
        }
      } catch (error) {
        console.error('[AI CENTER][Dialogs] message handling failed', error);
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      TENANTCONFIG = getTenantConfig();
      APPFEATURES = { ...APPFEATURES, ...getAppFeatures() };

      applyTenantTexts();
      renderDialogsPage();

      window.parent?.postMessage?.({ type: 'request-app-features' }, '*');
      window.parent?.postMessage?.({ type: 'request-agent-module-stats' }, '*');
    });
  })();
</script>
</body>
</html>
