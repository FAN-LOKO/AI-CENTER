<section class="card-section module-workspace-card">
  <div class="card-section-header">
    <h2 class="card-section-title">История сообщений</h2>
    <p class="card-section-subtitle">Здесь отображается переписка агента и клиента</p>
  </div>

  <div class="card-section-body">
    <div id="messagesContainer" class="chat-messages"></div>

    <textarea
      id="clientMessageInput"
      class="chat-input"
      rows="2"
      placeholder="Напишите сообщение клиенту..."
    ></textarea>

    <div class="chat-input-actions-row">
      <button
        class="btn btn-send"
        type="button"
        id="clientSendMessageButton"
      >
        Отправить
      </button>

      <button
        id="clientVoiceButton"
        class="btn btn-icon"
        type="button"
        aria-label="Записать голосовое сообщение"
      >
        <svg
          class="icon-mic"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a1 1 0 1 1 2 0 7 7 0 0 1-6 6.92V21h2a1 1 0 1 1 0 2H9a1 1 0 1 1 0-2h2v-3.08A7 7 0 0 1 5 11a1 1 0 1 1 2 0 5 5 0 0 0 10 0z"
          />
        </svg>
      </button>
    </div>

    <p id="clientSendMessageStatus" class="connect-status-msg"></p>
  </div>
</section>
