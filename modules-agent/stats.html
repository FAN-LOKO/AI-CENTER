<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Статистика агента</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/modules.css" />
</head>
<body class="module-body">
  <div class="page page-my-agent">
    <div class="module-tabs agent-tabs">
      <button class="module-tab module-tab--third" type="button" onclick="navigateAgent('modules-agent/profile.html')">Профиль</button>
      <button class="module-tab module-tab--third" type="button" onclick="navigateAgent('modules-agent/connect.html')">Подключение</button>
      <button class="module-tab module-tab--third" type="button" onclick="navigateAgent('modules-agent/links.html')">Ссылки</button>
      <button class="module-tab module-tab--half module-tab--active" type="button" onclick="navigateAgent('modules-agent/stats.html')">Статистика</button>
      <button class="module-tab module-tab--half" type="button" onclick="navigateAgent('modules-agent/dialogs.html')">Диалоги</button>
    </div>

    <div class="module-page-content module-stats-page">
      <section class="card-section">
        <div class="card-section-header">
          <h2 class="card-section-title">Краткая статистика</h2>
          <p class="card-section-subtitle">Основные показатели работы агента</p>
        </div>
        <div class="card-section-body">
          <div class="module-summary">
            <div class="module-summary-row">
              <div class="module-summary-label">Диалоги</div>
              <div class="module-summary-value" id="statDialogsTotal">0</div>
            </div>

            <div class="module-summary-row">
              <div class="module-summary-label">Выданные реферальные ссылки</div>
              <div class="module-summary-value" id="statRefLinksTotal">0</div>
            </div>

            <div class="module-summary-row">
              <div class="module-summary-label">Новых диалогов за сегодня</div>
              <div class="module-summary-value" id="statDialogsToday">0</div>
            </div>

            <div class="module-summary-row">
              <div class="module-summary-label">Новых ссылок за сегодня</div>
              <div class="module-summary-value" id="statRefLinksToday">0</div>
            </div>
          </div>
        </div>
      </section>

      <section class="card-section accordion-card open">
        <button class="card-section-header accordion-header" type="button" onclick="toggleAccordion(this)">
          <span class="card-section-title">Детализация</span>
          <span class="accordion-header-icon">▲</span>
        </button>

        <div class="card-section-body accordion-body" style="display: block;">
          <section class="card-section accordion-card open">
            <button class="card-section-header accordion-header" type="button" onclick="toggleAccordion(this)">
              <span class="card-section-title">Список диалогов</span>
              <span class="accordion-header-icon">▲</span>
            </button>

            <div class="card-section-body accordion-body" style="display: block;">
              <p class="card-section-subtitle">
                Кликните по диалогу, чтобы открыть его и продолжить общение с клиентом.
              </p>

              <div id="dialogsList" class="stats-dialogs-list">
                <div class="module-notice">Загрузка диалогов...</div>
              </div>
            </div>
          </section>

          <section class="card-section accordion-card open">
            <button class="card-section-header accordion-header" type="button" onclick="toggleAccordion(this)">
              <span class="stats-accordion-head">
                <span class="card-section-title">Выданные ссылки</span>
                <span class="stats-accordion-subtitle">
                  Здесь будут отображаться последние выданные клиентам ссылки.
                </span>
              </span>
              <span class="accordion-header-icon">▲</span>
            </button>

            <div class="card-section-body accordion-body" style="display: block;">
              <div id="issuedLinksList" class="stats-issued-links-list">
                <div class="module-notice">Загрузка ссылок...</div>
              </div>
            </div>
          </section>
        </div>
      </section>
    </div>
  </div>

  <script>
  (function () {
    let TENANTCONFIG = null;
    let APPFEATURES = {
      home: true,
      myAgent: true,
      modules: true,
      sharedChat: true,
      affiliate: true,
      payments: true,
      settings: true
    };

    function getShell() {
      try {
        return window.parent?.AICAppShell || null;
      } catch (error) {
        console.error('[AI CENTER][Agent Stats] shell access failed', error);
        return null;
      }
    }

    function getTenantConfig() {
      try {
        return getShell()?.getTenantConfig?.() || null;
      } catch (error) {
        console.error('[AI CENTER][Agent Stats] tenant config read failed', error);
        return null;
      }
    }

    function getAppFeatures() {
      try {
        return getShell()?.getAppFeatures?.() || {};
      } catch (error) {
        console.error('[AI CENTER][Agent Stats] app features read failed', error);
        return {};
      }
    }

    function getText(key, fallback = '') {
      return TENANTCONFIG?.texts?.[key] ?? fallback;
    }

    function navigateAgent(page) {
      if (APPFEATURES.myAgent === false) {
        console.warn('[AI CENTER][Agent Stats] agent module is disabled');
        return;
      }

      try {
        window.parent?.postMessage?.({ type: 'navigate', page, tab: 'modules' }, '*');
      } catch (error) {
        console.error('[AI CENTER][Agent Stats] navigate failed', error);
      }
    }

    function toggleAccordion(button) {
      const card = button.closest('.accordion-card');
      const body = card?.querySelector('.accordion-body');
      const icon = button.querySelector('.accordion-header-icon');

      if (!card || !body || !icon) return;

      const isOpen = card.classList.contains('open');

      if (isOpen) {
        card.classList.remove('open');
        body.style.display = 'none';
        icon.textContent = getText('agentStatsAccordionClosedIcon', '▼');
      } else {
        card.classList.add('open');
        body.style.display = 'block';
        icon.textContent = getText('agentStatsAccordionOpenIcon', '▲');
      }
    }

    function formatSequenceNumber(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n <= 0) {
        return getText('agentStatsSequenceFallback', '000');
      }
      return String(n).padStart(3, '0');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getAgentStats() {
      try {
        const stats = getShell()?.getAgentStats?.();
        if (stats && typeof stats === 'object') return stats;
      } catch (error) {
        console.error('[AI CENTER][Agent Stats] read failed', error);
      }

      return {
        dialogs: [],
        issuedLinks: [],
        stats: {}
      };
    }

    function setTextContent(id, value, fallback = '') {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = value ?? fallback;
    }

    function applyTenantTexts() {
      setTextContent(
        'agentStatsPageTitle',
        getText('agentStatsPageTitle', 'Статистика агента')
      );
      setTextContent(
        'agentStatsPageSubtitle',
        getText('agentStatsPageSubtitle', 'Сводка по диалогам и выданным ссылкам.')
      );

      setTextContent(
        'statDialogsTotalLabel',
        getText('agentStatsDialogsTotalLabel', 'Всего диалогов')
      );
      setTextContent(
        'statRefLinksTotalLabel',
        getText('agentStatsRefLinksTotalLabel', 'Всего ссылок')
      );
      setTextContent(
        'statDialogsTodayLabel',
        getText('agentStatsDialogsTodayLabel', 'Диалогов сегодня')
      );
      setTextContent(
        'statRefLinksTodayLabel',
        getText('agentStatsRefLinksTodayLabel', 'Ссылок сегодня')
      );

      setTextContent(
        'dialogsAccordionTitle',
        getText('agentStatsDialogsSectionTitle', 'Диалоги')
      );
      setTextContent(
        'issuedLinksAccordionTitle',
        getText('agentStatsIssuedLinksSectionTitle', 'Выданные ссылки')
      );

      document.title =
        getText('agentStatsBrowserTitle', '') ||
        getText('agentStatsPageTitle', '') ||
        'Статистика агента';
    }

    function renderStatsSummary(statsData) {
      const dialogs = Array.isArray(statsData?.dialogs) ? statsData.dialogs : [];
      const issuedLinks = Array.isArray(statsData?.issuedLinks) ? statsData.issuedLinks : [];

      const statDialogsTotal = document.getElementById('statDialogsTotal');
      const statRefLinksTotal = document.getElementById('statRefLinksTotal');
      const statDialogsToday = document.getElementById('statDialogsToday');
      const statRefLinksToday = document.getElementById('statRefLinksToday');

      if (statDialogsTotal) statDialogsTotal.textContent = String(dialogs.length);
      if (statRefLinksTotal) statRefLinksTotal.textContent = String(issuedLinks.length);

      if (statDialogsToday) {
        statDialogsToday.textContent = String(
          Number(statsData?.stats?.dialogsToday ?? statsData?.dialogsToday ?? 0)
        );
      }

      if (statRefLinksToday) {
        statRefLinksToday.textContent = String(
          Number(statsData?.stats?.issuedLinksToday ?? statsData?.refLinksToday ?? statsData?.issuedLinksToday ?? 0)
        );
      }
    }

    function openDialog(dialogId, username, channel, timeLabel, lastMessage) {
      if (APPFEATURES.myAgent === false) {
        console.warn('[AI CENTER][Agent Stats] agent module is disabled');
        return;
      }

      try {
        window.parent?.postMessage?.(
          {
            type: 'agent-open-dialog',
            dialogId,
            username,
            channel,
            timeLabel,
            lastMessage
          },
          '*'
        );
      } catch (error) {
        console.error('[AI CENTER][Agent Stats] open dialog failed', error);
      }
    }

    function renderDialogsList(dialogs) {
      const container = document.getElementById('dialogsList');
      if (!container) return;

      if (APPFEATURES.myAgent === false) {
        container.innerHTML = `<div class="module-notice">${escapeHtml(
          getText('agentStatsDisabledText', 'Модуль агента сейчас недоступен.')
        )}</div>`;
        return;
      }

      if (!Array.isArray(dialogs) || dialogs.length === 0) {
        container.innerHTML = `<div class="module-notice">${escapeHtml(
          getText('agentStatsDialogsEmptyText', 'Диалогов пока нет.')
        )}</div>`;
        return;
      }

      container.innerHTML = '';

      dialogs.forEach((dialog, index) => {
        const item = document.createElement('div');
        item.className = 'dialog-item';

        const username =
          dialog?.username ||
          dialog?.clientName ||
          getText('agentStatsUsernameFallback', '@username');

        const channel =
          dialog?.channel ||
          getText('agentStatsChannelFallback', 'Telegram');

        const timeLabel = dialog?.timeLabel || dialog?.time || '';
        const lastMessage =
          dialog?.lastMessage ||
          dialog?.message ||
          getText('agentStatsMessageFallback', 'Сообщений пока нет');

        const displayNumber = formatSequenceNumber(index + 1);

        item.innerHTML = `
          <div class="dialog-item-row">
            <span class="dialog-user">${displayNumber} • ${escapeHtml(username)}</span>
            <span class="dialog-time">${escapeHtml(timeLabel)}</span>
          </div>
          <div class="dialog-last-msg">${escapeHtml(lastMessage)}</div>
        `;

        item.addEventListener('click', () => {
          openDialog(dialog?.id || dialog?.dialogId || '', username, channel, timeLabel, lastMessage);
        });

        container.appendChild(item);
      });
    }

    function renderIssuedLinksList(issuedLinks, dialogs) {
      const container = document.getElementById('issuedLinksList');
      if (!container) return;

      if (APPFEATURES.myAgent === false) {
        container.innerHTML = `<div class="module-notice">${escapeHtml(
          getText('agentStatsDisabledText', 'Модуль агента сейчас недоступен.')
        )}</div>`;
        return;
      }

      if (!Array.isArray(issuedLinks) || issuedLinks.length === 0) {
        container.innerHTML = `<div class="module-notice">${escapeHtml(
          getText('agentStatsIssuedLinksEmptyText', 'Выданных ссылок пока нет.')
        )}</div>`;
        return;
      }

      const dialogList = Array.isArray(dialogs) ? dialogs : [];

      function resolveDialogNumber(linkItem) {
        if (!linkItem || typeof linkItem !== 'object') {
          return getText('agentStatsEmptyValue', '—');
        }

        if (linkItem.dialogId) {
          const directIndex = dialogList.findIndex(
            (dialog) => String(dialog?.id || dialog?.dialogId || '') === String(linkItem.dialogId)
          );
          if (directIndex >= 0) return formatSequenceNumber(directIndex + 1);
        }

        const linkClient = String(linkItem.clientName || linkItem.username || '').trim().toLowerCase();
        if (linkClient) {
          const byClientIndex = dialogList.findIndex((dialog) => {
            const dialogClient = String(dialog?.username || dialog?.clientName || '').trim().toLowerCase();
            return dialogClient && dialogClient === linkClient;
          });
          if (byClientIndex >= 0) return formatSequenceNumber(byClientIndex + 1);
        }

        return getText('agentStatsEmptyValue', '—');
      }

      container.innerHTML = issuedLinks.map((item) => {
        const clientName =
          item?.clientName ||
          item?.username ||
          getText('agentStatsUsernameFallback', '@username');

        const linkType =
          item?.type ||
          item?.linkType ||
          item?.title ||
          getText('agentStatsLinkTypeFallback', 'Клиентская');

        const issuedAt =
          item?.issuedAt ||
          item?.timeLabel ||
          item?.time ||
          getText('agentStatsEmptyValue', '—');

        const dialogNumber = resolveDialogNumber(item);

        return `
          <div class="stats-issued-card">
            <div class="module-summary">
              <div class="stats-issued-head">
                <div class="stats-issued-client-label">${escapeHtml(
                  getText('agentStatsIssuedToLabel', 'Кому')
                )}</div>
                <div class="stats-issued-client-name">${escapeHtml(clientName)}</div>
              </div>

              <div class="stats-issued-links">
                <div class="stats-issued-link">
                  <div class="profile-row">
                    <div class="profile-label">${escapeHtml(
                      getText('agentStatsDialogLabel', 'Диалог')
                    )}</div>
                    <div class="profile-value">${escapeHtml(dialogNumber)}</div>
                  </div>
                  <div class="profile-row">
                    <div class="profile-label">${escapeHtml(
                      getText('agentStatsLinkTypeLabel', 'Тип ссылки')
                    )}</div>
                    <div class="profile-value">${escapeHtml(linkType)}</div>
                  </div>
                  <div class="profile-row">
                    <div class="profile-label">${escapeHtml(
                      getText('agentStatsTimeLabel', 'Время')
                    )}</div>
                    <div class="profile-value">${escapeHtml(issuedAt)}</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderAgentStatsPage() {
      const statsData = getAgentStats();
      const dialogs = Array.isArray(statsData?.dialogs) ? statsData.dialogs : [];
      const issuedLinks = Array.isArray(statsData?.issuedLinks) ? statsData.issuedLinks : [];

      renderStatsSummary(statsData);
      renderDialogsList(dialogs);
      renderIssuedLinksList(issuedLinks, dialogs);
    }

    function applyAppFeatures(features) {
      APPFEATURES = { ...APPFEATURES, ...(features || {}) };
      renderAgentStatsPage();
    }

    window.navigateAgent = navigateAgent;
    window.toggleAccordion = toggleAccordion;

    window.addEventListener('message', (event) => {
      try {
        const data = event?.data;
        if (!data || typeof data !== 'object') return;

        if (data.type === 'app-features') {
          applyAppFeatures(data.features || {});
        }

        if (
          data.type === 'agent-stats-update' ||
          data.type === 'agent-dialog-update' ||
          data.type === 'agent-links-update'
        ) {
          renderAgentStatsPage();
        }
      } catch (error) {
        console.error('[AI CENTER][Agent Stats] message handling failed', error);
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      TENANTCONFIG = getTenantConfig();
      APPFEATURES = { ...APPFEATURES, ...getAppFeatures() };

      applyTenantTexts();
      renderAgentStatsPage();

      window.parent?.postMessage?.({ type: 'request-app-features' }, '*');
    });
  })();
</script>
</body>
</html>
