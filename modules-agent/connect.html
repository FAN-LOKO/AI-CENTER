<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Подключение агента</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/modules.css" />
</head>
<body class="module-body">
  <div class="page page-my-agent">
    <div class="module-tabs agent-tabs">
      <button class="module-tab module-tab--third" type="button" onclick="navigateAgent('modules-agent/profile.html')">Профиль</button>
      <button class="module-tab module-tab--third module-tab--active" type="button" onclick="navigateAgent('modules-agent/connect.html')">Подключение</button>
      <button class="module-tab module-tab--third" type="button" onclick="navigateAgent('modules-agent/links.html')">Ссылки</button>
      <button class="module-tab module-tab--half" type="button" onclick="navigateAgent('modules-agent/stats.html')">Статистика</button>
      <button class="module-tab module-tab--half" type="button" onclick="navigateAgent('modules-agent/dialogs.html')">Диалоги</button>
    </div>

    <div class="app-content">
      <section class="card-section">
        <div class="card-section-header">
          <h2 class="card-section-title">Подключение агента</h2>
          <p class="card-section-subtitle">Настройка Telegram-бота и статуса подключения</p>
        </div>
        <div class="card-section-body module-stack">
          <div class="form-group">
            <label class="form-label" for="botToken">Токен бота</label>
            <input id="botToken" class="form-input" type="text" placeholder="Введите токен Telegram-бота" />
          </div>

          <div class="form-group">
            <label class="form-label" for="botWebhook">Webhook URL</label>
            <input id="botWebhook" class="form-input" type="text" placeholder="https://..." />
          </div>

          <button class="btn" type="button" id="saveConnectButton">Сохранить</button>
          <p id="connectStatusMessage" class="connect-status-msg"></p>
        </div>
      </section>
    </div>
  </div>

  <script>
    function navigateAgent(page) {
      try {
        window.parent?.postMessage?.({ type: 'navigate', page, tab: 'modules' }, '*');
      } catch (e) {
        console.error(e);
      }
    }

    function getAgentConnectState() {
      try {
        return window.parent?.AICAppShell?.getAgentConnect?.() || null;
      } catch (error) {
        console.error('[AI CENTER][Agent Connect] connect state read failed', error);
        return null;
      }
    }

    function showStatus(message, isError = false) {
      const el = document.getElementById('connectStatusMessage');
      if (!el) return;
      el.textContent = message || '';
      el.classList.remove('success', 'error');
      if (message) el.classList.add(isError ? 'error' : 'success');
    }

    function applyConnectState() {
      const state = getAgentConnectState() || {};
      const tokenEl = document.getElementById('botToken');
      const webhookEl = document.getElementById('botWebhook');
      if (tokenEl && state.token) tokenEl.value = state.token;
      if (webhookEl && state.webhook) webhookEl.value = state.webhook;
    }

    function saveConnectSettings() {
      const token = document.getElementById('botToken')?.value?.trim() || '';
      const webhook = document.getElementById('botWebhook')?.value?.trim() || '';
      window.parent?.postMessage?.({ type: 'agent-connect-save', token, webhook }, '*');
      showStatus('Настройки подключения отправлены на сохранение...');
    }

    document.addEventListener('DOMContentLoaded', () => {
      try { window.Telegram?.WebApp?.ready?.(); } catch (e) {}
      applyConnectState();
      document.getElementById('saveConnectButton')?.addEventListener('click', saveConnectSettings);
    });
  </script>
</body>
</html>
