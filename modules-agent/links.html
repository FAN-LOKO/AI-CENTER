<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Ссылки агента</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/modules.css" />
</head>
<body class="module-body">
  <div class="page page-my-agent">
    <div class="module-tabs agent-tabs">
      <button class="module-tab module-tab--third" type="button" onclick="navigateAgent('modules-agent/profile.html')">Профиль</button>
      <button class="module-tab module-tab--third" type="button" onclick="navigateAgent('modules-agent/connect.html')">Подключение</button>
      <button class="module-tab module-tab--third module-tab--active" type="button" onclick="navigateAgent('modules-agent/links.html')">Ссылки</button>
      <button class="module-tab module-tab--half" type="button" onclick="navigateAgent('modules-agent/stats.html')">Статистика</button>
      <button class="module-tab module-tab--half" type="button" onclick="navigateAgent('modules-agent/dialogs.html')">Диалоги</button>
    </div>

    <div class="module-page-content">
      <section class="card-section">
        <div class="card-section-header">
          <h2 class="card-section-title">Ссылки агента</h2>
          <p class="card-section-subtitle">Генерация и просмотр реферальных ссылок</p>
        </div>
        <div class="card-section-body module-stack">
          <div class="form-group">
            <label class="form-label" for="linkType">Тип ссылки</label>
            <select id="linkType" class="form-input">
              <option value="client">Клиентская ссылка</option>
              <option value="partner">Партнерская ссылка</option>
            </select>
          </div>

          <button class="btn" type="button" id="generateLinkButton">Сгенерировать ссылку</button>
          <p id="linksStatusMessage" class="connect-status-msg"></p>

          <div id="generatedLinksList" class="module-stack">
            <div class="module-notice">Ссылки пока не сгенерированы.</div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    function navigateAgent(page) {
      try {
        window.parent?.postMessage?.({ type: 'navigate', page, tab: 'modules' }, '*');
      } catch (e) {
        console.error(e);
      }
    }

    function getAgentLinksState() {
      try {
        return window.parent?.AICAppShell?.getAgentLinks?.() || null;
      } catch (error) {
        console.error('[AI CENTER][Agent Links] links state read failed', error);
        return null;
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function showStatus(message, isError = false) {
      const el = document.getElementById('linksStatusMessage');
      if (!el) return;
      el.textContent = message || '';
      el.classList.remove('success', 'error');
      if (message) el.classList.add(isError ? 'error' : 'success');
    }

    function renderLinks(items) {
      const listEl = document.getElementById('generatedLinksList');
      if (!listEl) return;

      if (!Array.isArray(items) || items.length === 0) {
        listEl.innerHTML = '<div class="module-notice">Ссылки пока не сгенерированы.</div>';
        return;
      }

      listEl.innerHTML = items.map((item) => `
        <div class="form-group">
          <div class="profile-row"><span class="profile-label">Тип</span><span class="profile-value">${escapeHtml(item.type || '—')}</span></div>
          <div class="profile-row"><span class="profile-label">Ссылка</span><span class="profile-value"><a class="link-primary" href="${escapeHtml(item.url || '#')}" target="_blank" rel="noopener noreferrer">Открыть</a></span></div>
          <div class="profile-row"><span class="profile-label">Дата</span><span class="profile-value">${escapeHtml(item.createdAt || '—')}</span></div>
        </div>
      `).join('');
    }

    function applyLinksState() {
      const state = getAgentLinksState() || {};
      const typeEl = document.getElementById('linkType');
      if (typeEl && state.defaultType) typeEl.value = state.defaultType;
      renderLinks(state.items || []);
    }

    function generateLink() {
      const type = document.getElementById('linkType')?.value || 'client';
      window.parent?.postMessage?.({ type: 'agent-generate-link', linkType: type }, '*');
      showStatus('Запрос на генерацию ссылки отправлен...');
    }

    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || typeof data !== 'object') return;
      if (data.type === 'agent-links-update') {
        renderLinks(data.items || []);
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      try { window.Telegram?.WebApp?.ready?.(); } catch (e) {}
      applyLinksState();
      document.getElementById('generateLinkButton')?.addEventListener('click', generateLink);
    });
  </script>
</body>
</html>
