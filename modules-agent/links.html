<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Ссылки агента</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/modules.css" />
</head>
<body class="module-body">
  <div class="page page-my-agent">
    <div class="module-tabs agent-tabs">
      <button class="module-tab module-tab--third" type="button" onclick="navigateAgent('modules-agent/profile.html')">Профиль</button>
      <button class="module-tab module-tab--third" type="button" onclick="navigateAgent('modules-agent/connect.html')">Подключение</button>
      <button class="module-tab module-tab--third module-tab--active" type="button" onclick="navigateAgent('modules-agent/links.html')">Ссылки</button>
      <button class="module-tab module-tab--half" type="button" onclick="navigateAgent('modules-agent/stats.html')">Статистика</button>
      <button class="module-tab module-tab--half" type="button" onclick="navigateAgent('modules-agent/dialogs.html')">Диалоги</button>
    </div>

    <div class="module-page-content module-links-page">
      <!-- Карточка 1: Партнёрские ссылки -->
      <section class="card-section accordion-card open">
        <button class="card-section-header accordion-header" type="button" onclick="toggleAccordion(this)">
          <span class="card-section-title">Партнёрские ссылки</span>
          <span class="accordion-header-icon">▲</span>
        </button>

        <div class="card-section-body accordion-body" style="display: block;">
          <p class="card-section-subtitle">
            Введите реферальные ссылки в компании PM International.
          </p>

          <div class="form-group">
            <label class="form-label" for="pmPartnerLink">
              Ваша партнёрская ссылка<br />
              <span class="profile-label">
                вида [https://www.pmebusiness.com/registrationv2?TP=XXXXXXXX](https://www.pmebusiness.com/registrationv2?TP=XXXXXXXX)
              </span>
            </label>
            <input
              type="url"
              id="pmPartnerLink"
              class="form-input"
              placeholder="https://www.pmebusiness.com/registrationv2?TP=XXXXXXXX"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="pmClientLink">
              Ваша клиентская ссылка<br />
              <span class="profile-label">
                вида [https://www.fitline.com/?sponsor=XXXXXXXX](https://www.fitline.com/?sponsor=XXXXXXXX)
              </span>
            </label>
            <input
              type="url"
              id="pmClientLink"
              class="form-input"
              placeholder="https://www.fitline.com/?sponsor=XXXXXXXX"
            />
          </div>

          <button class="btn btn-block" id="savePmLinksButton">
            Сохранить партнёрские ссылки
          </button>

          <p id="savePmLinksMessage" class="connect-status-msg" hidden></p>
        </div>
      </section>

      <!-- Карточка 2: Ваши соцсети -->
      <section class="card-section accordion-card open">
        <button class="card-section-header accordion-header" type="button" onclick="toggleAccordion(this)">
          <span class="card-section-title">Ваши соцсети</span>
          <span class="accordion-header-icon">▲</span>
        </button>

        <div class="card-section-body accordion-body" style="display: block;">
          <p class="card-section-subtitle">
            Введите ссылки на соцсети и мессенджеры. Все поля опциональные.
          </p>

          <div class="form-group">
            <label class="form-label" for="telegramLink">Telegram</label>
            <input
              type="url"
              id="telegramLink"
              class="form-input"
              placeholder="https://t.me/username"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="whatsappLink">WhatsApp</label>
            <input
              type="url"
              id="whatsappLink"
              class="form-input"
              placeholder="https://wa.me/..."
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="instagramLink">Instagram</label>
            <input
              type="url"
              id="instagramLink"
              class="form-input"
              placeholder="https://instagram.com/..."
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="vkLink">VKontakte</label>
            <input
              type="url"
              id="vkLink"
              class="form-input"
              placeholder="https://vk.com/..."
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="youtubeLink">YouTube</label>
            <input
              type="url"
              id="youtubeLink"
              class="form-input"
              placeholder="https://youtube.com/@..."
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="tiktokLink">TikTok</label>
            <input
              type="url"
              id="tiktokLink"
              class="form-input"
              placeholder="https://tiktok.com/@..."
            />
          </div>

          <button class="btn btn-block" id="saveSocialLinksButton">
            Сохранить соцсети
          </button>

          <p id="saveSocialLinksMessage" class="connect-status-msg" hidden></p>
        </div>
      </section>
    </div>
  </div>

  <script>
  (function () {
    let TENANTCONFIG = null;
    let APPFEATURES = {
      home: true,
      myAgent: true,
      modules: true,
      sharedChat: true,
      affiliate: true,
      payments: true,
      settings: true
    };

    let currentLinksState = {
      pmPartnerLink: '',
      pmClientLink: '',
      telegramLink: '',
      whatsappLink: '',
      instagramLink: '',
      vkLink: '',
      youtubeLink: '',
      tiktokLink: ''
    };

    function getShell() {
      try {
        return window.parent?.AICAppShell || null;
      } catch (error) {
        console.error('[AI CENTER][Agent Links] shell access failed', error);
        return null;
      }
    }

    function getTenantConfig() {
      try {
        return getShell()?.getTenantConfig?.() || null;
      } catch (error) {
        console.error('[AI CENTER][Agent Links] tenant config read failed', error);
        return null;
      }
    }

    function getAppFeatures() {
      try {
        return getShell()?.getAppFeatures?.() || {};
      } catch (error) {
        console.error('[AI CENTER][Agent Links] app features read failed', error);
        return {};
      }
    }

    function getText(key, fallback = '') {
      return TENANTCONFIG?.texts?.[key] ?? fallback;
    }

    function navigateAgent(page) {
      if (APPFEATURES.myAgent === false) {
        console.warn('[AI CENTER][Agent Links] agent module is disabled');
        return;
      }

      try {
        window.parent?.postMessage?.(
          { type: 'navigate', page, tab: 'modules' },
          '*'
        );
      } catch (error) {
        console.error('[AI CENTER][Agent Links] navigate failed', error);
      }
    }

    function toggleAccordion(button) {
      const card = button.closest('.accordion-card');
      const body = card?.querySelector(':scope > .accordion-body');
      if (!card || !body) return;

      const isOpen = card.classList.contains('open');
      card.classList.toggle('open', !isOpen);
      body.style.display = isOpen ? 'none' : 'block';
    }

    function setStatus(targetId, message, type) {
      const msgEl = document.getElementById(targetId);
      if (!msgEl) return;

      if (!message) {
        msgEl.textContent = '';
        msgEl.className = 'connect-status-msg';
        msgEl.hidden = true;
        return;
      }

      msgEl.hidden = false;
      msgEl.textContent = message;
      msgEl.className =
        'connect-status-msg ' + (type === 'error' ? 'error' : 'success');
    }

    function clearStatuses() {
      setStatus('savePmLinksMessage', '', '');
      setStatus('saveSocialLinksMessage', '', '');
    }

    function getLinksStateFromShell() {
      try {
        return getShell()?.getAgentLinks?.() || null;
      } catch (error) {
        console.error('[AI CENTER][Agent Links] links state read failed', error);
        return null;
      }
    }

    function normalizeLinksState(raw) {
      const data = raw && typeof raw === 'object' ? raw : {};

      return {
        pmPartnerLink: data.pmPartnerLink || '',
        pmClientLink: data.pmClientLink || '',
        telegramLink: data.telegramLink || '',
        whatsappLink: data.whatsappLink || '',
        instagramLink: data.instagramLink || '',
        vkLink: data.vkLink || '',
        youtubeLink: data.youtubeLink || '',
        tiktokLink: data.tiktokLink || ''
      };
    }

    function requestAgentLinks() {
      if (APPFEATURES.myAgent === false) return;

      try {
        window.parent?.postMessage?.({ type: 'agent-links-request' }, '*');
      } catch (error) {
        console.error('[AI CENTER][Agent Links] request failed', error);
      }
    }

    function setAgentLinksState(nextState) {
      currentLinksState = normalizeLinksState(nextState);
      applyLinksState(currentLinksState);
    }

    function applyLinksState(state) {
      const pmPartnerInput = document.getElementById('pmPartnerLink');
      const pmClientInput = document.getElementById('pmClientLink');

      const socialFields = {
        telegramLink: document.getElementById('telegramLink'),
        whatsappLink: document.getElementById('whatsappLink'),
        instagramLink: document.getElementById('instagramLink'),
        vkLink: document.getElementById('vkLink'),
        youtubeLink: document.getElementById('youtubeLink'),
        tiktokLink: document.getElementById('tiktokLink')
      };

      if (pmPartnerInput) pmPartnerInput.value = state.pmPartnerLink || '';
      if (pmClientInput) pmClientInput.value = state.pmClientLink || '';

      Object.keys(socialFields).forEach((key) => {
        if (socialFields[key]) {
          socialFields[key].value = state[key] || '';
        }
      });
    }

    function collectPmLinks() {
      return {
        pmPartnerLink: (document.getElementById('pmPartnerLink')?.value || '').trim(),
        pmClientLink: (document.getElementById('pmClientLink')?.value || '').trim()
      };
    }

    function collectSocialLinks() {
      return {
        telegramLink: (document.getElementById('telegramLink')?.value || '').trim(),
        whatsappLink: (document.getElementById('whatsappLink')?.value || '').trim(),
        instagramLink: (document.getElementById('instagramLink')?.value || '').trim(),
        vkLink: (document.getElementById('vkLink')?.value || '').trim(),
        youtubeLink: (document.getElementById('youtubeLink')?.value || '').trim(),
        tiktokLink: (document.getElementById('tiktokLink')?.value || '').trim()
      };
    }

    function applyTenantTexts() {
      const pageTitleEl = document.getElementById('agentLinksTitle');
      const pageSubtitleEl = document.getElementById('agentLinksSubtitle');
      const pmTitleEl = document.getElementById('pmLinksTitle');
      const socialTitleEl = document.getElementById('socialLinksTitle');
      const savePmBtn = document.getElementById('savePmLinksButton');
      const saveSocialBtn = document.getElementById('saveSocialLinksButton');

      if (pageTitleEl) {
        pageTitleEl.textContent = getText('agentLinksPageTitle', 'Ссылки и контакты');
      }

      if (pageSubtitleEl) {
        pageSubtitleEl.textContent = getText(
          'agentLinksPageSubtitle',
          'Сохраните партнёрские ссылки и ссылки на ваши соцсети.'
        );
      }

      if (pmTitleEl) {
        pmTitleEl.textContent = getText('agentLinksPmTitle', 'Партнёрские ссылки');
      }

      if (socialTitleEl) {
        socialTitleEl.textContent = getText('agentLinksSocialTitle', 'Социальные сети');
      }

      if (savePmBtn) {
        savePmBtn.textContent = getText('agentLinksPmSaveButton', 'Сохранить партнёрские ссылки');
      }

      if (saveSocialBtn) {
        saveSocialBtn.textContent = getText('agentLinksSocialSaveButton', 'Сохранить соцсети');
      }

      document.title =
        getText('agentLinksBrowserTitle', '') ||
        getText('agentLinksPageTitle', '') ||
        'Ссылки и контакты';
    }

    function syncAvailability() {
      const disabled = APPFEATURES.myAgent === false;

      [
        'pmPartnerLink',
        'pmClientLink',
        'telegramLink',
        'whatsappLink',
        'instagramLink',
        'vkLink',
        'youtubeLink',
        'tiktokLink',
        'savePmLinksButton',
        'saveSocialLinksButton'
      ].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.disabled = disabled;
      });

      if (disabled) {
        setStatus(
          'savePmLinksMessage',
          getText('agentLinksDisabledText', 'Модуль агента сейчас недоступен.'),
          'error'
        );
        setStatus(
          'saveSocialLinksMessage',
          getText('agentLinksDisabledText', 'Модуль агента сейчас недоступен.'),
          'error'
        );
      } else {
        clearStatuses();
      }
    }

    function bindActions() {
      const tg = window.Telegram?.WebApp;
      const savePmBtn = document.getElementById('savePmLinksButton');
      const saveSocialBtn = document.getElementById('saveSocialLinksButton');

      if (savePmBtn) {
        savePmBtn.addEventListener('click', () => {
          if (APPFEATURES.myAgent === false) {
            setStatus(
              'savePmLinksMessage',
              getText('agentLinksDisabledText', 'Модуль агента сейчас недоступен.'),
              'error'
            );
            return;
          }

          const data = collectPmLinks();

          if (!data.pmPartnerLink || !data.pmClientLink) {
            setStatus(
              'savePmLinksMessage',
              getText(
                'agentLinksPmRequiredError',
                'Введите обе ссылки: партнёрскую и клиентскую.'
              ),
              'error'
            );
            return;
          }

          try {
            getShell()?.setAgentLinks?.({
              ...currentLinksState,
              ...data
            });

            currentLinksState = {
              ...currentLinksState,
              ...data
            };

            setStatus(
              'savePmLinksMessage',
              getText('agentLinksPmSaved', 'Партнёрские ссылки сохранены.'),
              'success'
            );

            setStatus('saveSocialLinksMessage', '', '');

            tg?.HapticFeedback?.notificationOccurred?.('success');

            window.parent?.postMessage?.(
              {
                type: 'agent-pm-links-updated',
                links: data
              },
              '*'
            );
          } catch (error) {
            console.error('[AI CENTER][Agent Links] save pm links failed', error);
            setStatus(
              'savePmLinksMessage',
              getText(
                'agentLinksPmSaveError',
                'Не удалось сохранить партнёрские ссылки.'
              ),
              'error'
            );
          }
        });
      }

      if (saveSocialBtn) {
        saveSocialBtn.addEventListener('click', () => {
          if (APPFEATURES.myAgent === false) {
            setStatus(
              'saveSocialLinksMessage',
              getText('agentLinksDisabledText', 'Модуль агента сейчас недоступен.'),
              'error'
            );
            return;
          }

          const data = collectSocialLinks();

          try {
            getShell()?.setAgentLinks?.({
              ...currentLinksState,
              ...data
            });

            currentLinksState = {
              ...currentLinksState,
              ...data
            };

            setStatus(
              'saveSocialLinksMessage',
              getText('agentLinksSocialSaved', 'Ссылки на соцсети сохранены.'),
              'success'
            );

            setStatus('savePmLinksMessage', '', '');

            tg?.HapticFeedback?.notificationOccurred?.('success');

            window.parent?.postMessage?.(
              {
                type: 'agent-social-links-updated',
                links: data
              },
              '*'
            );
          } catch (error) {
            console.error('[AI CENTER][Agent Links] save social links failed', error);
            setStatus(
              'saveSocialLinksMessage',
              getText(
                'agentLinksSocialSaveError',
                'Не удалось сохранить ссылки на соцсети.'
              ),
              'error'
            );
          }
        });
      }
    }

    function applyAppFeatures(features) {
      APPFEATURES = { ...APPFEATURES, ...(features || {}) };
      syncAvailability();
    }

    window.navigateAgent = navigateAgent;
    window.toggleAccordion = toggleAccordion;

    window.addEventListener('message', (event) => {
      const data = event?.data;
      if (!data || typeof data !== 'object') return;

      if (data.type === 'app-features') {
        applyAppFeatures(data.features || {});
      }

      if (data.type === 'agent-links-response' && data.links) {
        setAgentLinksState(data.links);
      }

      if (data.type === 'agent-links-update' && data.links) {
        setAgentLinksState(data.links);
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const tg = window.Telegram?.WebApp;
      try {
        tg?.ready?.();
      } catch (error) {
        console.warn('[AI CENTER][Agent Links] Telegram ready failed', error);
      }

      TENANTCONFIG = getTenantConfig();
      APPFEATURES = { ...APPFEATURES, ...getAppFeatures() };

      applyTenantTexts();

      const shellState = getLinksStateFromShell();
      if (shellState) {
        setAgentLinksState(shellState);
      } else {
        applyLinksState(currentLinksState);
      }

      bindActions();
      syncAvailability();
      requestAgentLinks();

      window.parent?.postMessage?.({ type: 'request-app-features' }, '*');
    });
  })();
</script>
</body>
</html>
