<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>AI FIT CENTER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/runtime.js"></script>
    <script src="js/tenant-loader.js"></script>
    <!-- =========================================================
     PWA META / PWA-МЕТА
     Manifest, theme color and mobile install behavior
     Manifest, цвет темы и поведение установки на мобильных
========================================================= -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0b3c78" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="AI FIT CENTER" />
  </head>
  <body>
    <div class="screen">
      <!-- miniapp -->
      <div class="app-shell">
        <!-- header -->
        <div class="app-header">
          <div class="app-header-left">
            <span class="app-logo-text" id="appLogoText">AI CENTER</span>
          </div>
          <div class="app-header-right">
            <button class="icon-button" id="notificationsButton" type="button">
              <svg
                class="icon-svg"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 0 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"
                ></path>
                <path d="M10 19a2 2 0 0 0 4 0"></path>
              </svg>
              <span class="notif-badge" id="notifBadge">3</span>
            </button>

            <button class="icon-button" id="settingsButton" type="button">
              <svg
                class="icon-svg"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7z"
                ></path>
                <path
                  d="M19.4 10.5h-1.1a6.5 6.5 0 0 0-.5-1.3l.8-.8a1 1 0 0 0 0-1.4l-1.6-1.6a1 1 0 0 0-1.4 0l-.8.8a6.5 6.5 0 0 0-1.3-.5V3.6a1 1 0 0 0-1-1h-2.2a1 1 0 0 0-1 1v1.1a6.5 6.5 0 0 0-1.3.5l-.8-.8a1 1 0 0 0-1.4 0L3.4 6a1 1 0 0 0 0 1.4l.8.8a6.5 6.5 0 0 0-.5 1.3H2.6a1 1 0 0 0-1 1v2.2a1 1 0 0 0 1 1h1.1a6.5 6.5 0 0 0 .5 1.3l-.8.8a1 1 0 0 0 0 1.4L5 20.6a1 1 0 0 0 1.4 0l.8-.8a6.5 6.5 0 0 0 1.3.5v1.1a1 1 0 0 0 1 1h2.2a1 1 0 0 0 1-1v-1.1a6.5 6.5 0 0 0 1.3-.5l.8.8a1 1 0 0 0 1.4 0l1.6-1.6a1 1 0 0 0 0-1.4l-.8-.8a6.5 6.5 0 0 0 .5-1.3h1.1a1 1 0 0 0 1-1v-2.2a1 1 0 0 0-1-1z"
                ></path>
              </svg>
            </button>
          </div>
        </div>

        <!-- iframe -->
        <div class="app-content" id="appContent">
          <iframe
            id="pageFrame"
            src="home.html"
            title="Content"
            class="pageFrame"
          ></iframe>
        </div>

        <!-- bottom nav -->
        <nav class="bottom-nav" id="bottomNav">
          <button
  class="nav-btn active"
  data-page="home.html"
  data-tab="home"
  type="button"
>
  <svg
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
  >
    <path
      d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
    ></path>
    <polyline points="9 22 9 12 15 12 15 22"></polyline>
  </svg>
  <span class="nav-btn-label" id="navLabelHome">Главная</span>
          </button>

          <button
  class="nav-btn"
  data-page="my-agent.html"
  data-tab="my-agent"
  type="button"
>
  <svg
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
  >
    <path d="M3 5h18v10H7l-4 4V5z"></path>
  </svg>
  <span class="nav-btn-label" id="navLabelMyAgent">Мой агент</span>
          </button>

          <button
  class="nav-btn"
  data-page="shared-chat.html"
  data-tab="shared-chat"
  type="button"
>
  <div class="nav-btn-icon-wrapper">
    <svg
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <path
        d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v7A2.5 2.5 0 0 1 17.5 16H10l-4.5 4V16.5A2.5 2.5 0 0 1 4 14z"
        stroke-linecap="round"
        stroke-linejoin="round"
      ></path>
    </svg>
    <span
      class="nav-btn-badge nav-btn-badge--dot"
      id="sharedChatBadge"
    ></span>
  </div>
  <span class="nav-btn-label" id="navLabelSharedChat">Чат</span>
          </button>

          <button
  class="nav-btn"
  data-page="modules.html"
  data-tab="modules"
  type="button"
>
  <svg
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
  >
    <rect x="3" y="3" width="7" height="7"></rect>
    <rect x="14" y="3" width="7" height="7"></rect>
    <rect x="3" y="14" width="7" height="7"></rect>
    <rect x="14" y="14" width="7" height="7"></rect>
  </svg>
  <span class="nav-btn-label" id="navLabelModules">Модули</span>
          </button>

          <button
  class="nav-btn"
  data-page="partner.html"
  data-tab="affiliate"
  type="button"
>
  <svg
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
  >
    <path
      d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"
    ></path>
    <circle cx="9" cy="7" r="4"></circle>
    <path
      d="M23 21v-2a4 4 0 0 0-3-3.87"
    ></path>
    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
  </svg>
  <span class="nav-btn-label" id="navLabelAffiliate">Партнер</span>
          </button>

          <button
  class="nav-btn"
  data-page="payments.html"
  data-tab="payments"
  type="button"
>
  <svg
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
  >
    <rect x="1" y="4" width="22" height="16" rx="2"></rect>
    <line x1="11" y1="11" x2="23" y2="11"></line>
    <line x1="3" y1="11" x2="7" y2="11"></line>
  </svg>
  <span class="nav-btn-label" id="navLabelPayments">Платежи</span>
        </button>
        </nav>
      </div>
    </div>

<script src="js/runtime.js"></script>
<script src="js/tenant-loader.js"></script>
<script src="js/app-shell.js"></script>
<script>
  /* =========================================================
     SERVICE WORKER REGISTRATION / РЕГИСТРАЦИЯ SERVICE WORKER
     Registers the service worker in supported browsers
     Регистрирует service worker в поддерживаемых браузерах
  ========================================================= */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker
        .register('./sw.js')
        .catch((error) => console.error('Service worker registration failed:', error));
    });
  }
</script>
    <script>
  (async function () {
    if (!window.AICTenant || !window.AICTenant.load) {
      console.error('[AI CENTER][Shell] AICTenant is not available');
      return;
    }

    try {
      const config = await window.AICTenant.load();
      const modules = window.AICTenant.getModules ? window.AICTenant.getModules() : [];
      const sections = window.AICTenant.getSections ? window.AICTenant.getSections() : {};
      const plans = window.AICTenant.getPlans ? window.AICTenant.getPlans() : [];

      window.AICAppShell = {
        navigate(page, tab) {
          const frame = document.getElementById('pageFrame');
          if (frame) {
            frame.src = page;
          }

          if (tab && window.updateBottomNav) {
            window.updateBottomNav(tab);
          }
        },
        getCurrentTab: () =>
          window.currentTab || 'home',
        getFeatures: () =>
          (config && config.features) || {},
        getPageConfig: () =>
          (typeof window.PAGECONFIG !== 'undefined' ? window.PAGECONFIG : {}),
        getTenantConfig: () => config,
        getTenantDomains: () => config.domains || {},
        getTenantModules: () => modules || [],
        getTenantPlans: () => plans || [],
        getTenantSections: () => sections || {}
      };

      console.info('[AI CENTER][Shell] Tenant loaded in app shell', {
        tenantId: config.tenantId,
        modules: modules.length
      });
    } catch (error) {
      console.error('[AI CENTER][Shell] Failed to initialize tenant in app shell', error);
    }
  })();
</script>
  </body>
</html>
