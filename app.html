<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>AI FIT CENTER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="screen">
      <!-- miniapp -->
      <div class="app-shell">
        <!-- header -->
        <div class="app-header">
          <div class="app-header-left">
            <span class="app-logo-text">Ai Fit Center</span>
          </div>
          <div class="app-header-right">
            <button class="icon-button" id="notificationsButton" type="button">
              <svg
                class="icon-svg"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 0 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"
                ></path>
                <path d="M10 19a2 2 0 0 0 4 0"></path>
              </svg>
              <span class="notif-badge" id="notifBadge">3</span>
            </button>

            <button class="icon-button" id="settingsButton" type="button">
              <svg
                class="icon-svg"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7z"
                ></path>
                <path
                  d="M19.4 10.5h-1.1a6.5 6.5 0 0 0-.5-1.3l.8-.8a1 1 0 0 0 0-1.4l-1.6-1.6a1 1 0 0 0-1.4 0l-.8.8a6.5 6.5 0 0 0-1.3-.5V3.6a1 1 0 0 0-1-1h-2.2a1 1 0 0 0-1 1v1.1a6.5 6.5 0 0 0-1.3.5l-.8-.8a1 1 0 0 0-1.4 0L3.4 6a1 1 0 0 0 0 1.4l.8.8a6.5 6.5 0 0 0-.5 1.3H2.6a1 1 0 0 0-1 1v2.2a1 1 0 0 0 1 1h1.1a6.5 6.5 0 0 0 .5 1.3l-.8.8a1 1 0 0 0 0 1.4L5 20.6a1 1 0 0 0 1.4 0l.8-.8a6.5 6.5 0 0 0 1.3.5v1.1a1 1 0 0 0 1 1h2.2a1 1 0 0 0 1-1v-1.1a6.5 6.5 0 0 0 1.3-.5l.8.8a1 1 0 0 0 1.4 0l1.6-1.6a1 1 0 0 0 0-1.4l-.8-.8a6.5 6.5 0 0 0 .5-1.3h1.1a1 1 0 0 0 1-1v-2.2a1 1 0 0 0-1-1z"
                ></path>
              </svg>
            </button>
          </div>
        </div>

        <!-- iframe -->
        <div class="app-content" id="appContent">
          <iframe
            id="pageFrame"
            src="home.html"
            title="Content"
            class="pageFrame"
          ></iframe>
        </div>

        <!-- bottom nav -->
        <nav class="bottom-nav" id="bottomNav">
          <button
            class="nav-btn active"
            data-page="home.html"
            data-tab="home"
            type="button"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
              ></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span class="nav-btn-label">Главная</span>
          </button>

          <button
            class="nav-btn"
            data-page="my-agent.html"
            data-tab="my-agent"
            type="button"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M3 5h18v10H7l-4 4V5z"></path>
            </svg>
            <span class="nav-btn-label">Мой агент</span>
          </button>

          <button
            class="nav-btn"
            data-page="shared-chat.html"
            data-tab="shared-chat"
            type="button"
          >
            <div class="nav-btn-icon-wrapper">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v7A2.5 2.5 0 0 1 17.5 16H10l-4.5 4V16.5A2.5 2.5 0 0 1 4 14z"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                ></path>
              </svg>
              <span
                class="nav-btn-badge nav-btn-badge--dot"
                id="sharedChatBadge"
              ></span>
            </div>
            <span class="nav-btn-label">Чат</span>
          </button>

          <button
            class="nav-btn"
            data-page="modules.html"
            data-tab="modules"
            type="button"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
            </svg>
            <span class="nav-btn-label">Модули</span>
          </button>

          <button
            class="nav-btn"
            data-page="partner.html"
            data-tab="affiliate"
            type="button"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"
              ></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path
                d="M23 21v-2a4 4 0 0 0-3-3.87"
              ></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <span class="nav-btn-label">Партнер</span>
          </button>

          <button
            class="nav-btn"
            data-page="payments.html"
            data-tab="payments"
            type="button"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="1" y="4" width="22" height="16" rx="2"></rect>
              <line x1="11" y1="11" x2="23" y2="11"></line>
              <line x1="3" y1="11" x2="7" y2="11"></line>
            </svg>
            <span class="nav-btn-label">Платежи</span>
          </button>
        </nav>
      </div>
    </div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      const frame = document.getElementById('pageFrame');
      const navBtns = document.querySelectorAll('.nav-btn');

      const APPFEATURES = {
        home: true,
        myAgent: true,
        modules: true,
        sharedChat: true,
        affiliate: false,
        payments: true,
        settings: true
      };

      const PAGECONFIG = {
        home: { page: 'home.html', enabled: APPFEATURES.home },
        'my-agent': { page: 'my-agent.html', enabled: APPFEATURES.myAgent },
        modules: { page: 'modules.html', enabled: APPFEATURES.modules },
        'shared-chat': {
          page: 'shared-chat.html',
          enabled: APPFEATURES.sharedChat
        },
        affiliate: { page: 'partner.html', enabled: APPFEATURES.affiliate },
        payments: { page: 'payments.html', enabled: APPFEATURES.payments },
        settings: { page: 'settings.html', enabled: APPFEATURES.settings }
      };

      let currentTab = 'home';
      let USERPROFILE = null;

      function isTabEnabled(tab) {
        return !!PAGECONFIG[tab] && !!PAGECONFIG[tab].enabled;
      }

      function getFallbackTab() {
        const fallbackOrder = ['home', 'my-agent', 'modules', 'shared-chat', 'payments'];
        return fallbackOrder.find((tab) => isTabEnabled(tab)) || 'home';
      }

      function getPageByTab(tab) {
        if (!PAGECONFIG[tab]) return null;
        return PAGECONFIG[tab].page;
      }

      function getTabByPage(page) {
        for (const [tab, config] of Object.entries(PAGECONFIG)) {
          if (config.page === page) return tab;
        }
        return null;
      }

      function sendUserProfileToFrame() {
        if (!frame || !frame.contentWindow || !USERPROFILE) return;

        frame.contentWindow.postMessage(
          {
            type: 'user-profile',
            profile: USERPROFILE
          },
          '*'
        );
      }

      function sendFeaturesToFrame() {
        if (!frame || !frame.contentWindow) return;

        frame.contentWindow.postMessage(
          {
            type: 'app-features',
            features: APPFEATURES
          },
          '*'
        );

        if (USERPROFILE) {
          sendUserProfileToFrame();
        }
      }

      function updateNavVisibility() {
        navBtns.forEach((btn) => {
          const tab = btn.dataset.tab;
          const enabled = isTabEnabled(tab);
          btn.style.display = enabled ? '' : 'none';
        });
      }

      function updateActiveNav() {
        navBtns.forEach((btn) => {
          btn.classList.toggle('active', btn.dataset.tab === currentTab);
        });
      }

      function navigate(page, tab) {
        let targetTab = tab || getTabByPage(page) || currentTab;

        if (!isTabEnabled(targetTab)) {
          targetTab = getFallbackTab();
        }

        const finalPage = page || getPageByTab(targetTab);

        if (!finalPage) return;

        if (frame && frame.src !== finalPage) {
          frame.src = finalPage;
        }

        currentTab = targetTab;
        updateActiveNav();

        if (tg.HapticFeedback && tg.HapticFeedback.selectionChanged) {
          tg.HapticFeedback.selectionChanged();
        }

        if (currentTab === 'shared-chat') {
          const badge = document.getElementById('sharedChatBadge');
          if (badge) {
            badge.style.display = 'none';
          }
        }

        setTimeout(sendFeaturesToFrame, 150);
      }

      navBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          if (!isTabEnabled(tab)) return;

          const page = getPageByTab(tab);
          navigate(page, tab);
        });
      });

      window.addEventListener('message', (e) => {
        const data = e.data;
        if (!data || typeof data !== 'object') return;

        if (data.type === 'navigate') {
          const targetTab = data.tab || getTabByPage(data.page) || currentTab;

          if (!isTabEnabled(targetTab)) {
            navigate(getPageByTab(getFallbackTab()), getFallbackTab());
            return;
          }

          navigate(data.page || getPageByTab(targetTab), targetTab);
          return;
        }

        if (data.type === 'shared-chat-unread') {
          const badge = document.getElementById('sharedChatBadge');
          if (!badge) return;

          if (currentTab === 'shared-chat') {
            badge.style.display = 'none';
            return;
          }

          badge.style.display = data.hasUnread ? 'block' : 'none';
          return;
        }

        if (data.type === 'request-user-profile') {
          if (USERPROFILE && frame && frame.contentWindow) {
            frame.contentWindow.postMessage(
              {
                type: 'user-profile',
                profile: USERPROFILE
              },
              '*'
            );
          }
          return;
        }

        if (data.type === 'save-user-profile') {
          USERPROFILE = data.profile || data;
          sendUserProfileToFrame();
          return;
        }

        if (data.type === 'request-app-features') {
          sendFeaturesToFrame();
          return;
        }
      });

      document.addEventListener('DOMContentLoaded', () => {
        const settingsButton = document.getElementById('settingsButton');
        const notificationsButton = document.getElementById('notificationsButton');

        updateNavVisibility();

        const initialTab = isTabEnabled('home') ? 'home' : getFallbackTab();
        navigate(getPageByTab(initialTab), initialTab);

        if (settingsButton) {
          settingsButton.addEventListener('click', () => {
            if (!isTabEnabled('settings')) return;
            navigate(getPageByTab('settings'), 'settings');
          });
        }

        if (notificationsButton) {
          notificationsButton.addEventListener('click', () => {
            window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred?.('success');
            // TODO: открыть экран уведомлений, когда появится
          });
        }
      });
    </script>
  </body>
</html>
