<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#3b82f6" />
  <title>AI CENTER</title>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="screen">
    <div class="app-shell">
      <div class="app-header">
        <div class="app-header-left">
          <span class="app-logo-text" id="appLogoText">AI CENTER</span>
        </div>

        <div class="app-header-right">
          <button class="icon-button" id="notificationsButton" type="button" aria-label="Уведомления">
            <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 0 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"></path>
              <path d="M10 19a2 2 0 0 0 4 0"></path>
            </svg>
            <span class="notif-badge" id="notifBadge">3</span>
          </button>

          <button class="icon-button" id="settingsButton" type="button" aria-label="Настройки">
            <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7z"></path>
              <path d="M19.4 10.5h-1.1a6.5 6.5 0 0 0-.5-1.3l.8-.8a1 1 0 0 0 0-1.4l-1.6-1.6a1 1 0 0 0-1.4 0l-.8.8a6.5 6.5 0 0 0-1.3-.5V3.6a1 1 0 0 0-1-1h-2.2a1 1 0 0 0-1 1v1.1a6.5 6.5 0 0 0-1.3.5l-.8-.8a1 1 0 0 0-1.4 0L3.4 6a1 1 0 0 0 0 1.4l.8.8a6.5 6.5 0 0 0-.5 1.3H2.6a1 1 0 0 0-1 1v2.2a1 1 0 0 0 1 1h1.1a6.5 6.5 0 0 0 .5 1.3l-.8.8a1 1 0 0 0 0 1.4L5 20.6a1 1 0 0 0 1.4 0l.8-.8a6.5 6.5 0 0 0 1.3.5v1.1a1 1 0 0 0 1 1h2.2a1 1 0 0 0 1-1v-1.1a6.5 6.5 0 0 0 1.3-.5l.8.8a1 1 0 0 0 1.4 0l1.6-1.6a1 1 0 0 0 0-1.4l-.8-.8a6.5 6.5 0 0 0 .5-1.3h1.1a1 1 0 0 0 1-1v-2.2a1 1 0 0 0-1-1z"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="app-content" id="appContent">
        <iframe
          id="pageFrame"
          class="pageFrame"
          src="home.html"
          title="Content"
        ></iframe>
      </div>

      <nav class="bottom-nav" id="bottomNav">
        <button class="nav-btn active" data-page="home.html" data-tab="home" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span class="nav-btn-label" id="navLabelHome">Главная</span>
        </button>

        <button class="nav-btn" data-page="my-agent.html" data-tab="my-agent" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M3 5h18v10H7l-4 4V5z"></path>
          </svg>
          <span class="nav-btn-label" id="navLabelMyAgent">Мой агент</span>
        </button>

        <button class="nav-btn" data-page="shared-chat.html" data-tab="shared-chat" type="button">
          <div class="nav-btn-icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v7A2.5 2.5 0 0 1 17.5 16H10l-4.5 4V16.5A2.5 2.5 0 0 1 4 14z" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            <span class="nav-btn-badge nav-btn-badge--dot" id="sharedChatBadge"></span>
          </div>
          <span class="nav-btn-label" id="navLabelSharedChat">Чат</span>
        </button>

        <button class="nav-btn" data-page="modules.html" data-tab="modules" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
          </svg>
          <span class="nav-btn-label" id="navLabelModules">Модули</span>
        </button>

        <button class="nav-btn" data-page="partner.html" data-tab="affiliate" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          <span class="nav-btn-label" id="navLabelAffiliate">Партнер</span>
        </button>

        <button class="nav-btn" data-page="payments.html" data-tab="payments" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="1" y="4" width="22" height="16" rx="2"></rect>
            <line x1="1" y1="10" x2="23" y2="10"></line>
            <line x1="7" y1="15" x2="13" y2="15"></line>
          </svg>
          <span class="nav-btn-label" id="navLabelPayments">Платежи</span>
        </button>
      </nav>
    </div>
  </div>

  <script src="js/runtime.js"></script>
  <script src="js/tenant-loader.js"></script>
  <script src="js/app-version.js"></script>
  <script src="js/app-shell.js"></script>

  <script>
    (function () {
      const DEFAULT_TENANT = 'fitline';

      function getTenantFromQuery() {
        const params = new URLSearchParams(window.location.search);
        return params.get('tenant');
      }

      function getHostname() {
        return window.location.hostname;
      }

      function isLocalhostHost(hostname) {
        return (
          hostname === 'localhost' ||
          hostname === '127.0.0.1' ||
          hostname === '0.0.0.0'
        );
      }

      function getTenantFromHostname() {
        const hostname = getHostname();

        const hostMap = {
          'fit.ai-center.app': 'fitline',
          'www.fit.ai-center.app': 'fitline',
          'fitline.local': 'fitline'
        };

        return hostMap[hostname] || null;
      }

      function resolveTenantId() {
        const hostname = getHostname();
        const tenantFromHost = getTenantFromHostname();
        const tenantFromQuery = getTenantFromQuery();

        if (tenantFromHost) {
          console.info(
            '[AI CENTER][App] tenant source=hostname, host=%s, tenant=%s',
            hostname,
            tenantFromHost
          );
          return tenantFromHost;
        }

        if (isLocalhostHost(hostname) && tenantFromQuery) {
          console.info(
            '[AI CENTER][App] tenant source=query, host=%s, tenant=%s',
            hostname,
            tenantFromQuery
          );
          return tenantFromQuery;
        }

        console.info(
          '[AI CENTER][App] tenant source=fallback, host=%s, tenant=%s',
          hostname,
          DEFAULT_TENANT
        );
        return DEFAULT_TENANT;
      }

      async function fetchJson(url) {
        const response = await fetch(url, { cache: 'no-store' });

        if (!response.ok) {
          console.error(
            '[AI CENTER][App] config fetch failed',
            url,
            'status=',
            response.status,
            response.statusText
          );
          throw new Error('Failed to load config: ' + url);
        }

        return response.json();
      }

      function mergeConfig(baseConfig, tenantConfig) {
        const base = baseConfig || {};
        const tenant = tenantConfig || {};

        return {
          ...base,
          ...tenant,
          features: {
            ...(base.features || {}),
            ...(tenant.features || {})
          },
          theme: {
            ...(base.theme || {}),
            ...(tenant.theme || {})
          },
          policyLinks: {
            ...(base.policyLinks || {}),
            ...(tenant.policyLinks || {})
          },
          texts: {
            ...(base.texts || {}),
            ...(tenant.texts || {})
          },
          home: {
            ...(base.home || {}),
            ...(tenant.home || {})
          },
          branding: {
            ...(base.branding || {}),
            ...(tenant.branding || {})
          }
        };
      }

      async function loadMergedConfig(tenantId) {
        const [productConfig, tenantConfig] = await Promise.all([
          fetchJson('config/product-config.json'),
          fetchJson(`config/tenants/${tenantId}.json`)
        ]);

        return mergeConfig(productConfig, tenantConfig);
      }

      function resolveAppName(config) {
        const explicitAppName =
          typeof config?.appName === 'string' ? config.appName.trim() : '';

        if (explicitAppName) {
          return explicitAppName;
        }

        const branding = config?.branding || {};
        const pattern =
          typeof branding.shellNamePattern === 'string' &&
          branding.shellNamePattern.trim()
            ? branding.shellNamePattern.trim()
            : 'AI {brand} CENTER';

        const fallback =
          typeof branding.shellNameFallback === 'string' &&
          branding.shellNameFallback.trim()
            ? branding.shellNameFallback.trim()
            : 'AI CENTER';

        const brandToken =
          (typeof config?.shellBrandName === 'string' &&
            config.shellBrandName.trim()) ||
          (typeof config?.brandName === 'string' &&
            config.brandName.trim()) ||
          '';

        if (!brandToken) {
          return fallback;
        }

        return pattern.replace('{brand}', brandToken).replace(/\s+/g, ' ').trim();
      }

      function applyAppBranding(config) {
        const appName = resolveAppName(config);
        const logoTextEl = document.getElementById('appLogoText');

        document.title = appName || 'AI CENTER';

        if (logoTextEl) {
          logoTextEl.textContent = appName || 'AI CENTER';
        }
      }

      document.addEventListener('DOMContentLoaded', async function () {
        try {
          const tenantId = resolveTenantId();
          const config = await loadMergedConfig(tenantId);
          applyAppBranding(config);
        } catch (error) {
          console.error('[AI CENTER][App] branding load failed', error);
        }
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('./sw.js')
            .catch(function (error) {
              console.error('Service worker registration failed:', error);
            });
        });
      }
    })();
  </script>
</body>
</html>
