<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI FIT Center</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="page home-page">
      <section class="card-section home-profile-card">
        <div class="card-section-header">
          <h2 class="card-section-title">Профиль</h2>
          <p class="card-section-subtitle" id="homeProfileSubtitle">Telegram WebApp</p>
        </div>
        <div class="card-section-body">
          <div class="home-profile-row">
            <div class="home-profile-avatar" id="homeProfileAvatar">
              <span id="homeProfileAvatarFallback">U</span>
              <img
                id="homeProfileAvatarImage"
                alt="Аватар пользователя"
                hidden
              />
            </div>

            <div class="home-profile-main">
              <div class="home-profile-name" id="homeProfileName"></div>
              <div class="home-profile-username" id="homeProfileUsername">
                username
              </div>
              <div class="home-profile-id" id="homeProfileId">ID</div>
            </div>
          </div>

          <div class="home-profile-extra">
            <div class="home-profile-status" id="homeProfileStatus">
              ONLINE
            </div>
            <div class="home-profile-note" id="homeProfileNote">
              Telegram Mini App.
            </div>
          </div>
        </div>
      </section>

      <section class="card-section" id="homeModulesCard">
        <div class="card-section-header">
          <h2 class="card-section-title">Мои модули</h2>
          <p class="card-section-subtitle" id="homeModulesSubtitle">
            Только активные и доступные модули пользователя
          </p>
        </div>
        <div class="card-section-body">
          <div id="homeModulesList" class="home-module-list"></div>

          <div class="home-links-row">
            <button
              type="button"
              class="home-text-link"
              id="allModulesLink"
            >
              Все модули
            </button>
            <button
              type="button"
              class="home-text-link"
              id="paymentLink"
            >
              Перейти к оплатам
            </button>
          </div>
        </div>
      </section>

      <section class="card-section" id="homeAffiliateCard">
        <div class="card-section-header">
          <h2 class="card-section-title">Партнёрская программа</h2>
          <p class="card-section-subtitle">
            Быстрый доступ к партнёрскому разделу
          </p>
        </div>
        <div class="card-section-body">
          <div class="home-card-stack">
            <p class="home-card-text">
              Здесь будут доступны инструменты партнёра, структура и связанные функции.
            </p>
            <button
              type="button"
              class="btn btn-block"
              id="openAffiliateButton"
            >
              Открыть партнёрский раздел
            </button>
          </div>
        </div>
      </section>
    </div>

    <script>
      let APPFEATURES = {
        home: true,
        myAgent: true,
        modules: true,
        sharedChat: true,
        affiliate: true,
        payments: true,
        settings: true
      };

      let TENANTCONFIG = null;
      let TENANTMODULES = [];

      let USERMODULES = [
        { id: 'ai-agent', visible: true, paid: false, frozen: false, daysLeft: null },
        { id: 'knowledge-hub', visible: true, paid: false, frozen: false, daysLeft: null },
        { id: 'support-desk', visible: true, paid: false, frozen: false, daysLeft: null },
        { id: 'media-lab', visible: true, paid: true, frozen: false, daysLeft: 27 },
        { id: 'leader-stage', visible: true, paid: true, frozen: false, daysLeft: 14 }
      ];

      function getTenantConfig() {
        try {
          return window.parent?.AICAppShell?.getTenantConfig?.() || null;
        } catch (error) {
          console.error('[AI CENTER][Home] tenant config read failed', error);
          return null;
        }
      }

      function getTenantModules() {
        try {
          return window.parent?.AICAppShell?.getTenantModules?.() || [];
        } catch (error) {
          console.error('[AI CENTER][Home] tenant modules read failed', error);
          return [];
        }
      }

      function getTenantTexts() {
        return TENANTCONFIG?.texts || {};
      }

      function getTenantModuleMetaMap() {
        return TENANTMODULES.reduce((acc, module) => {
          acc[module.id] = {
            id: module.id,
            title: module.titleRu || module.title || module.id,
            page: module.page,
            requiresPayment: !!module.requiresPayment,
            enabled: module.enabled !== false,
            category: module.category || 'core'
          };
          return acc;
        }, {});
      }

      function navigateFromHome(page, tab) {
        window.parent?.postMessage?.(
          {
            type: 'navigate',
            page,
            tab
          },
          '*'
        );
      }

      function getModuleBadge(moduleMeta) {
        if (!moduleMeta.requiresPayment) {
          if (moduleMeta.category === 'core') {
            return { text: 'Базовый', className: 'required' };
          }
          return { text: 'Бесплатный', className: 'free' };
        }

        return { text: 'Платный', className: 'paid' };
      }

      function getModuleStatusText(module, moduleMeta) {
        if (!moduleMeta.requiresPayment) {
          return { text: 'Доступен', className: 'is-free' };
        }

        if (module.frozen) {
          const days = typeof module.daysLeft === 'number' ? module.daysLeft : null;

          if (days === 0) {
            return { text: 'Пробный период завершён', className: 'is-warning' };
          }

          if (days !== null && days > 0) {
            return { text: `Пробный период, осталось ${days} дн.`, className: 'is-warning' };
          }

          return { text: 'Пробный период', className: 'is-warning' };
        }

        if (typeof module.daysLeft === 'number' && module.daysLeft > 0) {
          return { text: `Оплачено, осталось ${module.daysLeft} дн.`, className: '' };
        }

        return { text: 'Активен', className: '' };
      }

      function getVisibleHomeModules() {
        const moduleMetaMap = getTenantModuleMetaMap();

        return USERMODULES.filter((module) => {
          if (!module.visible) return false;

          const meta = moduleMetaMap[module.id];
          if (!meta) return false;
          if (!meta.enabled) return false;
          if (APPFEATURES.modules === false) return false;

          return true;
        }).map((module) => ({
          ...module,
          meta: moduleMetaMap[module.id]
        }));
      }

      function renderHomeModules() {
        const container = document.getElementById('homeModulesList');
        if (!container) return;

        const visibleModules = getVisibleHomeModules();

        if (!visibleModules.length) {
          container.innerHTML =
            '<p class="home-empty-note">Пока нет доступных модулей. Как только они появятся, вы увидите их здесь.</p>';
          return;
        }

        container.innerHTML = visibleModules
          .map((module) => {
            const meta = module.meta;
            const badge = getModuleBadge(meta);
            const status = getModuleStatusText(module, meta);
            const isFrozen = !!module.frozen;

            return `
              <div class="home-module-item${isFrozen ? ' is-frozen' : ''}">
                <div class="home-module-top">
                  <div class="home-module-title">${meta.title}</div>
                  <span class="home-module-badge ${badge.className}">${badge.text}</span>
                </div>
                <p class="home-module-status ${status.className}">${status.text}</p>
                <div class="home-module-actions">
                  <button
                    type="button"
                    class="btn btn-block home-module-open-btn${isFrozen ? ' disabled' : ''}"
                    ${isFrozen ? 'disabled' : ''}
                    data-module-page="${meta.page}"
                  >
                    ${isFrozen ? 'Недоступен' : 'Открыть модуль'}
                  </button>
                </div>
              </div>
            `;
          })
          .join('');

        container.querySelectorAll('[data-module-page]').forEach((button) => {
          button.addEventListener('click', () => {
            const page = button.getAttribute('data-module-page');
            if (!page) return;
            navigateFromHome(page, 'modules');
          });
        });
      }

      function applyHomeFeatures(features) {
        APPFEATURES = { ...APPFEATURES, ...(features || {}) };

        const affiliateCard = document.getElementById('homeAffiliateCard');
        if (affiliateCard) {
          affiliateCard.hidden = APPFEATURES.affiliate === false;
        }

        const modulesCard = document.getElementById('homeModulesCard');
        if (modulesCard) {
          modulesCard.hidden = APPFEATURES.modules === false;
        }

        renderHomeModules();
      }

      function applyTenantContent() {
        TENANTCONFIG = getTenantConfig();
        TENANTMODULES = getTenantModules();

        const texts = getTenantTexts();

        if (texts.appTitle) {
          document.title = texts.appTitle;
        }

        const subtitleEl = document.getElementById('homeProfileSubtitle');
        if (subtitleEl) {
          subtitleEl.textContent = TENANTCONFIG?.appName || 'Telegram WebApp';
        }

        const modulesSubtitleEl = document.getElementById('homeModulesSubtitle');
        if (modulesSubtitleEl) {
          modulesSubtitleEl.textContent = 'Только активные и доступные модули пользователя';
        }

        const affiliateCard = document.getElementById('homeAffiliateCard');
        const sections = TENANTCONFIG?.sections || {};
        if (affiliateCard) {
          const affiliateEnabled =
            APPFEATURES.affiliate !== false &&
            sections.partnerProgram !== false;
          affiliateCard.hidden = !affiliateEnabled;
        }

        renderHomeModules();
      }

      function getTelegramUser() {
        return window.Telegram?.WebApp?.initDataUnsafe?.user || null;
      }

      function getTelegramFullName(user) {
        if (!user) return '';
        return [user.first_name || '', user.last_name || ''].filter(Boolean).join(' ').trim();
      }

      function setHomeAvatar(user, fullName) {
        const avatarFallbackEl = document.getElementById('homeProfileAvatarFallback');
        const avatarImageEl = document.getElementById('homeProfileAvatarImage');

        const letter = (fullName || 'U').charAt(0).toUpperCase();

        if (avatarFallbackEl) {
          avatarFallbackEl.textContent = letter;
          avatarFallbackEl.hidden = false;
        }

        if (avatarImageEl) {
          avatarImageEl.hidden = true;
          avatarImageEl.removeAttribute('src');
        }

        if (user?.photo_url && avatarImageEl) {
          avatarImageEl.src = user.photo_url;
          avatarImageEl.hidden = false;
          if (avatarFallbackEl) avatarFallbackEl.hidden = true;
        }
      }

      function fillTelegramProfile() {
        const user = getTelegramUser();

        const nameEl = document.getElementById('homeProfileName');
        const usernameEl = document.getElementById('homeProfileUsername');
        const idEl = document.getElementById('homeProfileId');
        const statusEl = document.getElementById('homeProfileStatus');
        const noteEl = document.getElementById('homeProfileNote');

        if (!user) {
          if (nameEl) nameEl.textContent = '';
          if (usernameEl) usernameEl.textContent = 'username';
          if (idEl) idEl.textContent = 'ID';
          if (statusEl) statusEl.textContent = 'GUEST';
          if (noteEl) noteEl.textContent = 'Telegram Mini App.';
          setHomeAvatar(null, 'U');
          return;
        }

        const fullName = getTelegramFullName(user);
        const usernameText = user.username ? `@${user.username}` : 'username не указан';
        const idText = user.id ? `ID: ${user.id}` : 'ID';

        if (nameEl) nameEl.textContent = fullName;
        if (usernameEl) usernameEl.textContent = usernameText;
        if (idEl) idEl.textContent = idText;
        if (statusEl) statusEl.textContent = 'ONLINE';
        if (noteEl) noteEl.textContent = 'Telegram Mini App.';

        setHomeAvatar(user, fullName || 'U');
      }

      function applyUserProfileOnHome(profile) {
        if (!profile || typeof profile !== 'object') return;

        const nameEl = document.getElementById('homeProfileName');
        const noteEl = document.getElementById('homeProfileNote');

        if (profile.fullName && nameEl) {
          nameEl.textContent = profile.fullName;
        }

        if (profile.email && noteEl) {
          noteEl.textContent = profile.email;
        }
      }

      window.addEventListener('message', (event) => {
        const data = event.data;
        if (!data || typeof data !== 'object') return;

        if (data.type === 'app-features') {
          applyHomeFeatures(data.features || {});
          return;
        }

        if (data.type === 'user-modules' && Array.isArray(data.modules)) {
          USERMODULES = data.modules;
          renderHomeModules();
          return;
        }

        if (data.type === 'user-profile') {
          applyUserProfileOnHome(data.profile || data);
          return;
        }
      });

      document.addEventListener('DOMContentLoaded', () => {
        const allModulesLink = document.getElementById('allModulesLink');
        const paymentLink = document.getElementById('paymentLink');
        const openAffiliateButton = document.getElementById('openAffiliateButton');

        if (allModulesLink) {
          allModulesLink.addEventListener('click', () => {
            navigateFromHome('modules.html', 'modules');
          });
        }

        if (paymentLink) {
          paymentLink.addEventListener('click', () => {
            navigateFromHome('payments.html', 'payments');
          });
        }

        if (openAffiliateButton) {
          openAffiliateButton.addEventListener('click', () => {
            navigateFromHome('partner.html', 'affiliate');
          });
        }

        applyTenantContent();
        fillTelegramProfile();
        renderHomeModules();

        window.parent?.postMessage?.(
          {
            type: 'request-app-features'
          },
          '*'
        );

        window.parent?.postMessage?.(
          {
            type: 'request-user-profile'
          },
          '*'
        );
      });
    </script>
  </body>
</html>
