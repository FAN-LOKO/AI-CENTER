<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  />
  <title>Настройки</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page settings-page">
    <section class="card-section">
      <div class="card-section-header">
        <h2 class="card-section-title">О приложении</h2>
        <p class="card-section-subtitle">
          Общая информация о платформе AI CENTER Miniapp
        </p>
      </div>

      <div class="card-section-body">
        <div class="settings-info-list">
          <div class="settings-info-row">
            <span class="settings-info-label">Версия платформы</span>
            <span class="settings-info-value" id="settingsAppVersion">—</span>
          </div>

          <div class="settings-info-row">
            <span class="settings-info-label">Сборка</span>
            <span class="settings-info-value" id="settingsBuildVersion">—</span>
          </div>

          <div class="settings-info-row">
            <span class="settings-info-label">Commit</span>
            <span class="settings-info-value" id="settingsCommitHash">—</span>
          </div>

          <div class="settings-info-row">
            <span class="settings-info-label">Дата сборки</span>
            <span class="settings-info-value" id="settingsBuiltAt">—</span>
          </div>

          <div class="settings-info-row">
            <span class="settings-info-label">Источник версии</span>
            <span class="settings-info-value" id="settingsVersionSource">—</span>
          </div>
        </div>
      </div>
    </section>

    <section class="card-section">
      <div class="card-section-header">
        <h2 class="card-section-title">Компания</h2>
        <p class="card-section-subtitle">
          Текущий бренд и конфигурация tenant
        </p>
      </div>

      <div class="card-section-body">
        <div class="settings-info-list">
          <div class="settings-info-row">
            <span class="settings-info-label">Tenant ID</span>
            <span class="settings-info-value" id="settingsTenantId">—</span>
          </div>

          <div class="settings-info-row">
            <span class="settings-info-label">Название приложения</span>
            <span class="settings-info-value" id="settingsAppName">—</span>
          </div>

          <div class="settings-info-row">
            <span class="settings-info-label">Основной домен</span>
            <span class="settings-info-value" id="settingsPrimaryDomain">—</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function initSettingsPage() {
      function safeGetShell() {
        try {
          return window.parent && window.parent.AICAppShell
            ? window.parent.AICAppShell
            : null;
        } catch (e) {
          console.error("Settings: parent shell access failed", e);
          return null;
        }
      }

      function readVersionInfo(shell) {
        if (!shell || typeof shell.getVersionInfo !== "function") {
          const runtime = window.parent && window.parent.AICRuntime
            ? window.parent.AICRuntime
            : null;
          return runtime && runtime.version ? runtime.version : null;
        }

        try {
          return shell.getVersionInfo() || null;
        } catch (e) {
          console.error("Settings: getVersionInfo failed", e);
          return null;
        }
      }

      function readTenantInfo(shell) {
        if (!shell || typeof shell.getTenantConfig !== "function") {
          return null;
        }

        try {
          return shell.getTenantConfig() || null;
        } catch (e) {
          console.error("Settings: getTenantConfig failed", e);
          return null;
        }
      }

      function formatDate(value) {
        if (!value) return "—";
        try {
          const d = new Date(value);
          if (Number.isNaN(d.getTime())) return value;
          const yyyy = d.getFullYear();
          const mm = String(d.getMonth() + 1).padStart(2, "0");
          const dd = String(d.getDate()).padStart(2, "0");
          const hh = String(d.getHours()).padStart(2, "0");
          const mi = String(d.getMinutes()).padStart(2, "0");
          return `${dd}.${mm}.${yyyy} ${hh}:${mi} UTC`;
        } catch {
          return value;
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        const shell = safeGetShell();

        const version = readVersionInfo(shell) || {};
        const appVersionEl = document.getElementById("settingsAppVersion");
        const buildVersionEl = document.getElementById("settingsBuildVersion");
        const commitHashEl = document.getElementById("settingsCommitHash");
        const builtAtEl = document.getElementById("settingsBuiltAt");
        const sourceEl = document.getElementById("settingsVersionSource");

        if (appVersionEl) {
          appVersionEl.textContent = version.appVersion || "—";
        }

        if (buildVersionEl) {
          buildVersionEl.textContent = version.buildVersion || "—";
        }

        if (commitHashEl) {
          commitHashEl.textContent = version.commitHash || "—";
        }

        if (builtAtEl) {
          builtAtEl.textContent = formatDate(version.builtAt);
        }

        if (sourceEl) {
          sourceEl.textContent = version.source || "—";
        }

        const tenant = readTenantInfo(shell) || {};
        const tenantIdEl = document.getElementById("settingsTenantId");
        const appNameEl = document.getElementById("settingsAppName");
        const primaryDomainEl = document.getElementById("settingsPrimaryDomain");

        if (tenantIdEl) {
          tenantIdEl.textContent = tenant.tenantId || "—";
        }

        if (appNameEl) {
          appNameEl.textContent = tenant.appName || "—";
        }

        if (primaryDomainEl) {
          const primary =
            tenant.domains && tenant.domains.primary
              ? tenant.domains.primary
              : null;
          primaryDomainEl.textContent = primary || "—";
        }
      });
    })();
  </script>
</body>
</html>
