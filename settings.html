<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  />
  <title>Настройки</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page settings-page">
    <!-- ДАННЫЕ ПРОФИЛЯ -->
    <section class="card-section">
      <div class="card-section-header">
        <h2 class="card-section-title">Данные профиля</h2>
        <p class="card-section-subtitle">
          Эти данные используются для авторизации в PWA и коммуникации
        </p>
      </div>

      <div class="card-section-body">
        <form class="settings-form" id="profileForm" novalidate>
          <div class="settings-form-group">
            <label for="profileFullName" class="settings-form-label">ФИО</label>
            <input
              id="profileFullName"
              name="fullName"
              type="text"
              class="settings-form-input"
              autocomplete="name"
              placeholder="Введите ФИО"
            />
          </div>

          <div class="settings-form-group">
            <label for="profileEmail" class="settings-form-label">Email</label>
            <input
              id="profileEmail"
              name="email"
              type="email"
              class="settings-form-input"
              autocomplete="email"
              placeholder="you@example.com"
              required
            />
            <p class="settings-form-hint">
              Email используется для входа в PWA и восстановления доступа.
            </p>
          </div>

          <div class="settings-form-actions">
            <button
              type="submit"
              class="btn btn-primary btn-block"
              id="profileSaveButton"
            >
              Сохранить
            </button>
          </div>

          <p class="settings-form-status" id="profileStatusMessage"></p>
        </form>
      </div>
    </section>

    <!-- О ПРИЛОЖЕНИИ -->
    <section class="card-section">
      <div class="card-section-header">
        <h2 class="card-section-title">О приложении</h2>
        <p class="card-section-subtitle">
          Общая информация о платформе AI CENTER Miniapp
        </p>
      </div>

      <div class="card-section-body">
        <div class="settings-info-list">
          <div class="settings-info-row">
            <span class="settings-info-label">Версия платформы</span>
            <span class="settings-info-value" id="settingsAppVersion">—</span>
          </div>

          <div class="settings-info-row">
            <span class="settings-info-label">Сборка</span>
            <span class="settings-info-value" id="settingsBuildVersion">—</span>
          </div>

          <div class="settings-info-row">
            <span class="settings-info-label">Commit</span>
            <span class="settings-info-value" id="settingsCommitHash">—</span>
          </div>

          <div class="settings-info-row">
            <span class="settings-info-label">Дата сборки</span>
            <span class="settings-info-value" id="settingsBuiltAt">—</span>
          </div>

          <div class="settings-info-row">
            <span class="settings-info-label">Источник версии</span>
            <span class="settings-info-value" id="settingsVersionSource">—</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function initSettingsPage() {
      function safeGetShell() {
        try {
          return window.parent && window.parent.AICAppShell
            ? window.parent.AICAppShell
            : null;
        } catch (e) {
          console.error("Settings: parent shell access failed", e);
          return null;
        }
      }

      function readVersionInfo(shell) {
        if (!shell || typeof shell.getVersionInfo !== "function") {
          const runtime =
            window.parent && window.parent.AICRuntime
              ? window.parent.AICRuntime
              : null;
          return runtime && runtime.version ? runtime.version : null;
        }

        try {
          return shell.getVersionInfo() || null;
        } catch (e) {
          console.error("Settings: getVersionInfo failed", e);
          return null;
        }
      }

      function formatDate(value) {
        if (!value) return "—";
        try {
          const d = new Date(value);
          if (Number.isNaN(d.getTime())) return value;
          const yyyy = d.getFullYear();
          const mm = String(d.getMonth() + 1).padStart(2, "0");
          const dd = String(d.getDate()).padStart(2, "0");
          const hh = String(d.getHours()).padStart(2, "0");
          const mi = String(d.getMinutes()).padStart(2, "0");
          return `${dd}.${mm}.${yyyy} ${hh}:${mi} UTC`;
        } catch {
          return value;
        }
      }

      function fillVersionBlock(shell) {
        const version = readVersionInfo(shell) || {};

        const appVersionEl = document.getElementById("settingsAppVersion");
        const buildVersionEl = document.getElementById("settingsBuildVersion");
        const commitHashEl = document.getElementById("settingsCommitHash");
        const builtAtEl = document.getElementById("settingsBuiltAt");
        const sourceEl = document.getElementById("settingsVersionSource");

        if (appVersionEl) appVersionEl.textContent = version.appVersion || "—";
        if (buildVersionEl) buildVersionEl.textContent = version.buildVersion || "—";
        if (commitHashEl) commitHashEl.textContent = version.commitHash || "—";
        if (builtAtEl) builtAtEl.textContent = formatDate(version.builtAt);
        if (sourceEl) sourceEl.textContent = version.source || "—";
      }

      function validateEmail(value) {
        if (!value) return false;
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(value.trim());
      }

      function fillProfileFormFromShell() {
        const fullNameInput = document.getElementById("profileFullName");
        const emailInput = document.getElementById("profileEmail");
        if (!fullNameInput && !emailInput) return;

        function applyProfile(profile) {
          if (!profile || typeof profile !== "object") return;
          if (fullNameInput && profile.fullName) {
            fullNameInput.value = profile.fullName;
          }
          if (emailInput && profile.email) {
            emailInput.value = profile.email;
          }
        }

        try {
          const shell = safeGetShell();
          if (!shell) return;

          const runtime =
            window.parent && window.parent.AICRuntime
              ? window.parent.AICRuntime
              : null;

          if (runtime && runtime.userProfile) {
            applyProfile(runtime.userProfile);
          }
        } catch (e) {
          console.error("Settings: fillProfileFormFromShell failed", e);
        }
      }

      function setupProfileForm(shell) {
        const form = document.getElementById("profileForm");
        const fullNameInput = document.getElementById("profileFullName");
        const emailInput = document.getElementById("profileEmail");
        const statusEl = document.getElementById("profileStatusMessage");
        const saveBtn = document.getElementById("profileSaveButton");

        if (!form || !emailInput || !saveBtn) return;

        function setStatus(message, type) {
          if (!statusEl) return;
          statusEl.textContent = message || "";
          statusEl.classList.remove("is-success", "is-error");
          if (type === "success") statusEl.classList.add("is-success");
          if (type === "error") statusEl.classList.add("is-error");
        }

        form.addEventListener("submit", function (event) {
          event.preventDefault();

          const fullName = fullNameInput ? fullNameInput.value.trim() : "";
          const email = emailInput.value.trim();

          if (!validateEmail(email)) {
            setStatus("Введите корректный email", "error");
            emailInput.focus();
            return;
          }

          const profile = {
            fullName: fullName || null,
            email,
            updatedAt: new Date().toISOString()
          };

          try {
            if (window.parent && window.parent.postMessage) {
              window.parent.postMessage(
                {
                  type: "save-user-profile",
                  profile
                },
                "*"
              );
            }
            setStatus("Профиль сохранён", "success");
          } catch (e) {
            console.error("Settings: save-user-profile postMessage failed", e);
            setStatus("Не удалось сохранить профиль", "error");
          }
        });
      }

      function bindProfileListener() {
        const fullNameInput = document.getElementById("profileFullName");
        const emailInput = document.getElementById("profileEmail");
        if (!fullNameInput && !emailInput) return;

        function applyProfile(profile) {
          if (!profile || typeof profile !== "object") return;
          if (fullNameInput && profile.fullName) {
            fullNameInput.value = profile.fullName;
          }
          if (emailInput && profile.email) {
            emailInput.value = profile.email;
          }
        }

        window.addEventListener("message", function (event) {
          const data = event.data;
          if (!data || typeof data !== "object") return;
          if (data.type === "user-profile") {
            applyProfile(data.profile);
          }
        });

        try {
          if (window.parent && window.parent.postMessage) {
            window.parent.postMessage(
              { type: "request-user-profile" },
              "*"
            );
          }
        } catch (e) {
          console.error("Settings: request-user-profile failed", e);
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        const shell = safeGetShell();
        fillVersionBlock(shell);
        fillProfileFormFromShell();
        setupProfileForm(shell);
        bindProfileListener();
      });
    })();
  </script>
</body>
</html>
